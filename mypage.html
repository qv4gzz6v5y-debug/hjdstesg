<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마이페이지</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .mypage-wrap{width:95%;max-width:1100px;margin:34px auto}
    .mypage-card{background:#fff;border-radius:22px;padding:24px;box-shadow:0 10px 24px rgba(0,0,0,.06);margin-bottom:22px}
    .card-title{font-size:34px;font-weight:900;margin-bottom:12px}
    .note,.empty-text{color:#666;font-size:15px;line-height:1.6}
    .menu-clean{display:flex;flex-wrap:wrap;gap:12px;padding:16px 0 0}
    .menu-clean a{text-decoration:none;padding:10px 14px;border-radius:14px;background:#fff;border:1px solid #d6d6d6;font-size:18px;color:#111}
    .profile-grid,.filter-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-top:14px}
    label{font-weight:900;display:block;margin-bottom:7px}
    .input{width:100%;padding:12px 14px;border-radius:14px;border:1px solid #d6dce5;box-sizing:border-box;font-size:15px;background:#fff}
    .btn{border:none;border-radius:12px;background:#1b65ba;color:#fff;font-weight:900;padding:12px 16px;cursor:pointer;margin-top:12px}
    .tabs{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0 18px}
    .tab-btn{border:none;border-radius:999px;padding:10px 15px;background:#eef1f5;color:#222;font-weight:900;cursor:pointer}
    .tab-btn.active{background:#1b65ba;color:#fff}
    .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-top:14px}
    .stat-card{background:#f6f8fb;border:1px solid #e1e6ee;border-radius:16px;padding:14px;text-align:center;color:#666;font-weight:800}
    .stat-card b{display:block;color:#111;font-size:22px;margin-top:5px}
    .game-box{background:#fbfcff;border:1px solid #e4eaf2;border-radius:18px;padding:18px;margin-bottom:14px}
    .game-top{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;font-size:18px;font-weight:900;margin-bottom:10px}
    .badge{display:inline-block;border-radius:999px;padding:5px 10px;background:#e8f1ff;color:#1b65ba;font-size:12px;font-weight:900;margin-right:6px}
    .badge.league{background:#fff3e8;color:#c26b00}.badge.intra{background:#eefaf2;color:#198754}
    .record-lines{display:grid;gap:8px;color:#333;line-height:1.6}
    .sub-title{font-weight:900;margin-top:12px;color:#1b65ba}
  
.date-search-wrap{
  display:flex;
  align-items:center;
  gap:12px;
}
.date-search-wrap input{
  flex:1;
}
.date-search-wrap button{
  height:44px;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* ===== mypage date search alignment fix ===== */
.date-search-row,
.date-search-wrap{
  display:flex !important;
  align-items:flex-end !important;
  gap:12px !important;
  flex-wrap:wrap !important;
}
.date-search-row > div,
.date-search-wrap > div{
  flex:1 1 260px !important;
}
.date-search-row input,
.date-search-wrap input{
  height:48px !important;
  box-sizing:border-box !important;
}
.date-search-row button,
.date-search-wrap button,
#clearDateBtn{
  height:48px !important;
  margin-top:0 !important;
  align-self:flex-end !important;
  display:inline-flex !important;
  align-items:center !important;
  justify-content:center !important;
  white-space:nowrap !important;
}

</style>

</head>
<body>
  <div class="wrap">
    <div class="top-title"><h1>레이 마린스</h1><a class="top-link" href="index.html">메인으로</a></div>
    <div class="menu-clean"><a href="lineup.html">라인업</a><a href="record.html">기록실</a><a href="scoresheet.html">기록지</a><a href="mypage.html">마이페이지</a></div>
  </div>

  <div class="mypage-wrap">
    <div class="mypage-card">
      <div class="card-title">마이페이지</div>
      <p id="userInfo" class="note">내 정보를 불러오는 중...</p>
      <div class="profile-grid">
        <div><label for="nicknameInput">닉네임</label><input id="nicknameInput" class="input"></div>
        <div><label for="numberInput">등번호</label><input id="numberInput" class="input"></div>
      </div>
      <button id="saveProfileBtn" class="btn">내 정보 저장</button>
    </div>

    <div class="mypage-card">
      <div class="card-title">내 기록</div>
      <div class="tabs">
        <button id="allTab" class="tab-btn active" type="button">전체 기록</button>
        <button id="practiceTab" class="tab-btn" type="button">연습경기 기록</button>
        <button id="leagueTab" class="tab-btn" type="button">리그경기 기록</button>
        <button id="intraTab" class="tab-btn" type="button">청백전 기록</button>
      </div>
      <div class="filter-grid date-search-row"><div><label for="dateSearch">경기별 기록 날짜 검색</label><input id="dateSearch" class="input" type="date"></div>
        <div><button id="clearDateBtn" class="btn" type="button">전체 날짜 보기</button></div></div>
      <div class="sub-title">시즌 누적 기록</div>
      <div id="seasonStats" class="stat-grid"></div>
    </div>

    <div class="mypage-card">
      <div class="card-title">경기별 기록</div>
      <div id="gameRecords"><p class="empty-text">기록을 불러오는 중...</p></div>
    </div>
  </div>

<script type="module">
import { db } from './firebase-config.js';
import { checkLogin } from './auth.js';
import { collection, query, orderBy, onSnapshot, doc, updateDoc } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js';

const $=id=>document.getElementById(id);
const userInfo=$('userInfo'), nicknameInput=$('nicknameInput'), numberInput=$('numberInput'), saveProfileBtn=$('saveProfileBtn');
const seasonStats=$('seasonStats'), gameRecords=$('gameRecords'), dateSearch=$('dateSearch'), clearDateBtn=$('clearDateBtn');
const tabs={전체:$('allTab'),연습경기:$('practiceTab'),리그경기:$('leagueTab'),청백전:$('intraTab')};
let currentUser=null,currentUserData=null,currentType='전체',sheets=[];

function num(v){return Number(v)||0}
function fmt3(v){return isFinite(v)?v.toFixed(3):'0.000'}
function badge(type){const cls=type==='리그경기'?'league':type==='청백전'?'intra':'';return `<span class="badge ${cls}">${type||'연습경기'}</span>`}
function nameMatches(name){return String(name||'').trim()===String(currentUserData?.nickname||'').trim()}
function inningToOuts(v){const s=String(v||'').trim();if(!s)return 0;if(!s.includes('.'))return num(s)*3;const [a,b]=s.split('.');return num(a)*3+num(b)}
function outsToInning(o){return `${Math.floor(o/3)}.${o%3}`}
function filteredSheets(){return sheets.filter(s=>{if(currentType!=='전체'&&(s.gameType||'연습경기')!==currentType)return false;if(dateSearch.value&&s.gameDate!==dateSearch.value)return false;return (s.batters||[]).some(b=>nameMatches(b.name))||(s.pitchers||[]).some(p=>nameMatches(p.name))})}
function calcStats(){const t={gamesSet:new Set(),ab:0,h:0,double:0,triple:0,hr:0,rbi:0,r:0,so:0,sb:0,bb:0,ibb:0,hbp:0,pGamesSet:new Set(),outs:0,er:0,runs:0,hitsAllowed:0,pso:0,pbb:0};filteredSheets().forEach(sheet=>{const key=sheet.id||`${sheet.gameType}_${sheet.gameDate}_${sheet.gameTime}`;(sheet.batters||[]).forEach(b=>{if(!nameMatches(b.name))return;const s=b.stats||{};t.gamesSet.add(key);t.ab+=num(s.ab);t.h+=num(s.h);t.double+=num(s.double);t.triple+=num(s.triple);t.hr+=num(s.hr);t.rbi+=num(s.rbi);t.r+=num(s.r);t.so+=num(s.so);t.sb+=num(s.sb);t.bb+=num(s.bb);t.ibb+=num(s.ibb);t.hbp+=num(s.hbp)});(sheet.pitchers||[]).forEach(p=>{if(!nameMatches(p.name))return;t.pGamesSet.add(key);t.outs+=inningToOuts(p.inning);t.er+=num(p.er);t.runs+=num(p.runs);t.hitsAllowed+=num(p.hits);t.pso+=num(p.so);t.pbb+=num(p.bb)})});const single=Math.max(t.h-t.double-t.triple-t.hr,0),tb=single+t.double*2+t.triple*3+t.hr*4;const avg=t.ab?t.h/t.ab:0,obpDen=t.ab+t.bb+t.ibb+t.hbp,obp=obpDen?(t.h+t.bb+t.ibb+t.hbp)/obpDen:0,slg=t.ab?tb/t.ab:0,inn=t.outs/3,era=inn?(t.er*9)/inn:0,whip=inn?(t.hitsAllowed+t.pbb)/inn:0,k9=inn?(t.pso*9)/inn:0;return {...t,avg,ops:obp+slg,era,whip,k9}}
function renderStats(){const s=calcStats();seasonStats.innerHTML=`<div class="stat-card">경기<b>${s.gamesSet.size}</b></div><div class="stat-card">타율<b>${fmt3(s.avg)}</b></div><div class="stat-card">OPS<b>${fmt3(s.ops)}</b></div><div class="stat-card">안타<b>${s.h}</b></div><div class="stat-card">홈런<b>${s.hr}</b></div><div class="stat-card">도루<b>${s.sb}</b></div><div class="stat-card">타점<b>${s.rbi}</b></div><div class="stat-card">득점<b>${s.r}</b></div><div class="stat-card">이닝<b>${outsToInning(s.outs)}</b></div><div class="stat-card">ERA<b>${fmt3(s.era)}</b></div><div class="stat-card">WHIP<b>${fmt3(s.whip)}</b></div><div class="stat-card">K/9<b>${fmt3(s.k9)}</b></div>`}
function renderGames(){const data=filteredSheets();if(!data.length){gameRecords.innerHTML='<p class="empty-text">조건에 맞는 내 기록이 없습니다.</p>';return}gameRecords.innerHTML=data.map(sheet=>{const bs=(sheet.batters||[]).filter(b=>nameMatches(b.name)),ps=(sheet.pitchers||[]).filter(p=>nameMatches(p.name));return `<div class="game-box"><div class="game-top"><div>${badge(sheet.gameType)} ${sheet.gameDate||'-'} ${sheet.gameTime||''} vs ${sheet.opponent||'-'}</div><div>${sheet.finalScore||'-'} ${sheet.gameResult||''}</div></div><div class="record-lines">${bs.length?'<div class="sub-title">타자 기록</div>':''}${bs.map(b=>{const s=b.stats||{};return `<div>${b.position||''} · ${s.ab||0}타수 ${s.h||0}안타 ${s.hr||0}홈런 ${s.rbi||0}타점 ${s.r||0}득점 ${s.sb||0}도루</div>`}).join('')}${ps.length?'<div class="sub-title">투수 기록</div>':''}${ps.map(p=>`<div>${p.decision||''} · ${p.inning||'0'}이닝 ${p.runs||0}실점 ${p.er||0}자책 ${p.so||0}탈삼진 ERA ${p.era||'0.00'}</div>`).join('')}</div></div>`}).join('')}
function setType(type){currentType=type;Object.entries(tabs).forEach(([k,b])=>b.classList.toggle('active',k===type));renderStats();renderGames()}
checkLogin((user,userData)=>{currentUser=user;currentUserData=userData;userInfo.textContent=`${userData.nickname||'-'} #${userData.number||'-'}`;nicknameInput.value=userData.nickname||'';numberInput.value=userData.number||'';onSnapshot(query(collection(db,'scoresheets'),orderBy('createdAt','desc')),snap=>{sheets=[];snap.forEach(d=>sheets.push({id:d.id,...d.data()}));renderStats();renderGames()})});
saveProfileBtn.onclick=async()=>{if(!currentUser)return;await updateDoc(doc(db,'users',currentUser.uid),{nickname:nicknameInput.value.trim(),number:numberInput.value.trim()});alert('내 정보 저장 완료');currentUserData.nickname=nicknameInput.value.trim();currentUserData.number=numberInput.value.trim();renderStats();renderGames()};
tabs.전체.onclick=()=>setType('전체');tabs.연습경기.onclick=()=>setType('연습경기');tabs.리그경기.onclick=()=>setType('리그경기');tabs.청백전.onclick=()=>setType('청백전');dateSearch.onchange=()=>{renderStats();renderGames()};clearDateBtn.onclick=()=>{dateSearch.value='';renderStats();renderGames()};
</script>
</body>
</html>
