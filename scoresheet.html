<body>
  <div class="wrap"><div class="top-title"><h1>레이 마린스</h1><a class="top-link" href="index.html">메인으로</a></div><div class="menu-clean"><a href="lineup.html">라인업</a><a href="record.html">기록실</a><a href="scoresheet.html">기록지</a><a href="mypage.html">마이페이지</a></div></div>

      </div><p id="lineupNotice" class="sheet-note">라인업 불러오기 대기 중...</p>
      <div class="section-title">이닝 점수</div><button type="button" id="addInningBtn" class="sheet-btn sub">연장 이닝 추가</button><button type="button" id="removeInningBtn" class="sheet-btn sub">마지막 이닝 삭제</button><div class="sheet-table-wrap"><table class="sheet-table"><thead id="inningHead"></thead><tbody id="inningBody"></tbody></table></div>

    </div>
    <div class="sheet-card"><div class="card-title">저장된 기록지</div><div id="sheetList"><p class="empty-text">기록지를 불러오는 중...</p></div></div>
  </div>
<script type="module">

const $=id=>document.getElementById(id);const editCard=$("editCard"),gameTypeInput=$("gameType"),gameDateInput=$("gameDate"),gameTimeInput=$("gameTime"),opponentInput=$("opponent"),homeAwayInput=$("homeAway"),finalScoreInput=$("finalScore"),gameResultInput=$("gameResult"),saveBtn=$("saveBtn"),resetBtn=$("resetBtn"),addInningBtn=$("addInningBtn"),removeInningBtn=$("removeInningBtn"),addPitcherBtn=$("addPitcherBtn"),sheetList=$("sheetList"),battersBody=$("battersBody"),pitchersBody=$("pitchersBody"),inningHead=$("inningHead"),inningBody=$("inningBody"),lineupNotice=$("lineupNotice");let currentEditId=null,sheets=[],batterRowCounter=0,pitcherRowCounter=0,inningCount=9,currentUserData=null;

function today(){const n=new Date();return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,"0")}-${String(n.getDate()).padStart(2,"0")}`;}function lineupId(){return `${gameTypeInput.value}_${gameDateInput.value}`;}

function updateBatter(id){$(`b_record_${id}`).value=getRecordText(id);const s=batterStats(getRecordText(id));$(`b_summary_${id}`).innerHTML=`<div class="summary-title">자동 계산</div><div class="stat-grid"><div class="stat-pill">타수<b>${s.ab}</b></div><div class="stat-pill">안타<b>${s.h}</b></div><div class="stat-pill">2루타<b>${s.double}</b></div><div class="stat-pill">3루타<b>${s.triple}</b></div><div class="stat-pill">홈런<b>${s.hr}</b></div><div class="stat-pill">삼진<b>${s.so}</b></div><div class="stat-pill">실책<b>${s.e}</b></div><div class="stat-pill">주루사<b>${s.runout}</b></div><div class="stat-pill wide">타점 / 득점<b>${s.rbi} / ${s.r}</b></div></div>`;renderTokens(id);}window.addBatterToken=(id,t)=>{const arr=getTokens(id);arr.push(t);setTokens(id,arr);updateBatter(id)};window.removeBatterToken=(id,i)=>{const arr=getTokens(id);arr.splice(i,1);setTokens(id,arr);updateBatter(id)};window.clearBatterRecord=id=>{setTokens(id,[]);$(`b_manual_${id}`).value="";updateBatter(id)};
function inningsToOuts(v){const str=String(v||"").trim();if(!str)return 0;if(!str.includes('.'))return(Number(str)||0)*3;const [w,p]=str.split('.');return(Number(w)||0)*3+(Number(p)||0)}function outsToInning(o){return `${Math.floor(o/3)}.${o%3}`;}function era(inn,er){const outs=inningsToOuts(inn);if(!outs)return"0.00";return(((Number(er)||0)*9)/(outs/3)).toFixed(2)}
function renderPitcherChips(id){const area=$(`p_token_area_${id}`);const items=[];const dec=$(`p_decision_${id}`).value;if(dec)items.push(['decision',`결과 ${dec}`,'plus']);[['inning','이닝','hit'],['so','삼진','plus'],['runs','실점','warn'],['er','자책','warn'],['hits','피안타','hit'],['hr','피홈런','hit'],['bb','사사구','hit']].forEach(([f,l,c])=>{const v=$(`p_${f}_${id}`).value;if(v&&Number(v)!==0)items.push([f,`${l} ${v}`,c])});area.innerHTML=items.map(([f,l,c])=>`<span class="token-chip ${c}">${l}<button type="button" class="token-x" onclick="removePitcherChip(${id},'${f}')">×</button></span>`).join('')}
function updatePitcher(id){$(`p_era_${id}`).textContent=era($(`p_inning_${id}`).value,$(`p_er_${id}`).value);const g=f=>$(`p_${f}_${id}`).value||"0",decision=$(`p_decision_${id}`).value||"-";$(`p_summary_${id}`).innerHTML=`<div class="summary-title">투수 요약</div><div class="stat-grid"><div class="stat-pill">결과<b>${decision}</b></div><div class="stat-pill">이닝<b>${g('inning')}</b></div><div class="stat-pill">삼진<b>${g('so')}</b></div><div class="stat-pill">사사구<b>${g('bb')}</b></div><div class="stat-pill wide">실점 / 자책<b>${g('runs')} / ${g('er')}</b></div><div class="stat-pill wide">피안타 / 피홈런<b>${g('hits')} / ${g('hr')}</b></div><div class="stat-pill wide">ERA<b>${$(`p_era_${id}`).textContent}</b></div></div>`;renderPitcherChips(id)}window.removePitcherChip=(id,f)=>{const el=$(`p_${f}_${id}`);if(el)el.value="";updatePitcher(id)};window.addPitcherOut=(id,n)=>{$(`p_inning_${id}`).value=outsToInning(inningsToOuts($(`p_inning_${id}`).value)+n);updatePitcher(id)};window.plusPitcherStat=(id,f)=>{$(`p_${f}_${id}`).value=Number($(`p_${f}_${id}`).value||0)+1;updatePitcher(id)};window.setPitcherDecision=(id,v)=>{$(`p_decision_${id}`).value=v;updatePitcher(id)};window.clearPitcherRow=id=>{['decision','inning','runs','er','hits','hr','so','bb'].forEach(f=>$(`p_${f}_${id}`).value="");updatePitcher(id)};
function batterButtons(id){return `<div class="quick-panel"><div class="quick-group"><div class="quick-title">안타</div><div class="quick-row"><button class="quick-btn hit" onclick="addBatterToken(${id},'안타')">1루타</button><button class="quick-btn hit" onclick="addBatterToken(${id},'2루타')">2루타</button><button class="quick-btn hit" onclick="addBatterToken(${id},'3루타')">3루타</button><button class="quick-btn hit" onclick="addBatterToken(${id},'홈런')">홈런</button></div></div><div class="quick-group"><div class="quick-title">출루 / 아웃</div><div class="quick-row"><button class="quick-btn warn" onclick="addBatterToken(${id},'볼넷')">볼넷</button><button class="quick-btn warn" onclick="addBatterToken(${id},'사구')">사구</button><button class="quick-btn out" onclick="addBatterToken(${id},'삼진')">삼진</button><button class="quick-btn out" onclick="addBatterToken(${id},'땅볼')">땅볼</button><button class="quick-btn out" onclick="addBatterToken(${id},'뜬공')">뜬공</button><button class="quick-btn out" onclick="addBatterToken(${id},'병살타')">병살</button><button class="quick-btn warn" onclick="addBatterToken(${id},'희생플라이')">희플</button><button class="quick-btn warn" onclick="addBatterToken(${id},'실책')">실책</button><button class="quick-btn out" onclick="addBatterToken(${id},'주루사')">주루사</button></div></div><div class="quick-group"><div class="quick-title">추가 기록</div><div class="quick-row"><button class="quick-btn plus" onclick="addBatterToken(${id},'1타점')">+1타점</button><button class="quick-btn plus" onclick="addBatterToken(${id},'1득점')">+1득점</button><button class="quick-btn danger" onclick="clearBatterRecord(${id})">초기화</button></div></div></div>`}
function pitcherButtons(id){return `<div class="quick-panel"><div class="quick-group"><div class="quick-title">이닝</div><div class="quick-row pitcher"><button class="quick-btn hit" onclick="addPitcherOut(${id},1)">+1아웃</button><button class="quick-btn hit" onclick="addPitcherOut(${id},3)">+1이닝</button></div></div><div class="quick-group"><div class="quick-title">투구 기록</div><div class="quick-row pitcher"><button class="quick-btn plus" onclick="plusPitcherStat(${id},'so')">+삼진</button><button class="quick-btn warn" onclick="plusPitcherStat(${id},'runs')">+실점</button><button class="quick-btn warn" onclick="plusPitcherStat(${id},'er')">+자책</button><button class="quick-btn hit" onclick="plusPitcherStat(${id},'hits')">+피안타</button><button class="quick-btn hit" onclick="plusPitcherStat(${id},'hr')">+피홈런</button><button class="quick-btn hit" onclick="plusPitcherStat(${id},'bb')">+사사구</button></div></div><div class="quick-group"><div class="quick-title">결과</div><div class="quick-row pitcher"><button class="quick-btn plus" onclick="setPitcherDecision(${id},'승')">승</button><button class="quick-btn out" onclick="setPitcherDecision(${id},'패')">패</button><button class="quick-btn" onclick="setPitcherDecision(${id},'홀드')">홀드</button><button class="quick-btn" onclick="setPitcherDecision(${id},'세이브')">세이브</button><button class="quick-btn danger" onclick="clearPitcherRow(${id})">초기화</button></div></div></div>`}
function createBatterRow(data={}){batterRowCounter++;const id=batterRowCounter,card=document.createElement('div');if(data.isSub)card.classList.add('sub-row');card.classList.add('player-card-row','batter-player-card');card.dataset.rowId=id;card.innerHTML=`<div class="player-card-head"><div><span class="field-label">타순</span><input id="b_order_${id}" class="cell-input" value="${data.order??''}" placeholder="1"></div><div><span class="field-label">선수명</span><input id="b_name_${id}" class="cell-input" value="${data.name??''}" placeholder="선수명"></div><div><span class="field-label">포지션</span><input id="b_pos_${id}" class="cell-input" value="${data.position??''}" placeholder="CF"></div></div><div class="player-card-main"><div><div class="card-panel-title">기록 입력</div><div class="record-editor"><div class="record-compose"><div id="token_area_${id}" class="token-area"></div><textarea id="b_manual_${id}" class="manual-input" placeholder="직접 입력도 가능"></textarea><input id="b_record_${id}" type="hidden"></div>${batterButtons(id)}</div></div><div><div class="card-panel-title">자동 계산</div><div class="stat-summary" id="b_summary_${id}"></div></div><div class="card-actions"><button class="sheet-btn small sub" onclick="addSubRow(${id})">교체</button><button class="sheet-btn small delete batter-delete-btn" onclick="removeBatterRow(${id})">삭제</button><span class="delete-hint">1명만 남으면 삭제 불가</span></div></div>`;const raw=String(data.record||'').trim();if(raw){const parts=raw.split(/\s+/).filter(Boolean);$(`b_record_${id}`).dataset.tokens=parts.filter(known).join(' ');$(`b_manual_${id}`).value=parts.filter(x=>!known(x)).join(' ')}$(`b_manual_${id}`).addEventListener('input',()=>updateBatter(id));setTimeout(()=>{updateBatter(id);refreshDeletes()},0);return card}
function createPitcherRow(data={}){pitcherRowCounter++;const id=pitcherRowCounter,card=document.createElement('div');card.classList.add('player-card-row','pitcher-player-card');card.dataset.pitcherRowId=id;card.innerHTML=`<div class="player-card-head pitcher-card-head"><div><span class="field-label">투수명</span><input id="p_name_${id}" class="cell-input" value="${data.name??''}" placeholder="투수명"></div><div><span class="field-label">결과</span><input id="p_decision_${id}" class="cell-input" value="${data.decision??''}" placeholder="승/패/홀드"></div></div><div class="player-card-main pitcher-card-main"><div><div class="card-panel-title">투수 기록</div><div class="pitcher-card"><div class="pitcher-compose"><div id="p_token_area_${id}" class="pitcher-token-area"></div><div class="pitcher-fields"><label>이닝<input id="p_inning_${id}" class="cell-input" value="${data.inning??''}"></label><label>실점<input id="p_runs_${id}" class="cell-input" value="${data.runs??''}"></label><label>자책<input id="p_er_${id}" class="cell-input" value="${data.er??''}"></label><label>피안타<input id="p_hits_${id}" class="cell-input" value="${data.hits??''}"></label><label>피홈런<input id="p_hr_${id}" class="cell-input" value="${data.hr??''}"></label><label>탈삼진<input id="p_so_${id}" class="cell-input" value="${data.so??''}"></label><label>사사구<input id="p_bb_${id}" class="cell-input" value="${data.bb??''}"></label></div></div>${pitcherButtons(id)}</div></div><div><div class="card-panel-title">요약</div><div class="pitcher-summary" id="p_summary_${id}"></div><div id="p_era_${id}" style="display:none">0.00</div></div><div class="card-actions"><button class="sheet-btn small delete pitcher-delete-btn" onclick="removePitcherRow(${id})">삭제</button><span class="delete-hint">1명만 남으면 삭제 불가</span></div></div>`;['decision','inning','runs','er','hits','hr','so','bb'].forEach(f=>$(`p_${f}_${id}`).addEventListener('input',()=>updatePitcher(id)));setTimeout(()=>{updatePitcher(id);refreshDeletes()},0);return card}
function refreshDeletes(){battersBody.querySelectorAll('.batter-delete-btn').forEach(b=>b.disabled=battersBody.querySelectorAll('.batter-player-card').length<=1);pitchersBody.querySelectorAll('.pitcher-delete-btn').forEach(b=>b.disabled=pitchersBody.querySelectorAll('.pitcher-player-card').length<=1)}function createBatters(){battersBody.innerHTML='';batterRowCounter=0;for(let i=1;i<=9;i++)battersBody.appendChild(createBatterRow({order:i}));refreshDeletes()}function createPitchers(){pitchersBody.innerHTML='';pitcherRowCounter=0;pitchersBody.appendChild(createPitcherRow());refreshDeletes()}
function getBatters(){return[...battersBody.querySelectorAll('.batter-player-card')].map(r=>{const id=r.dataset.rowId,record=getRecordText(id),s=batterStats(record);return{order:$(`b_order_${id}`).value.trim(),name:$(`b_name_${id}`).value.trim(),position:$(`b_pos_${id}`).value.trim(),record,isSub:r.classList.contains('sub-row'),stats:{ab:s.ab,h:s.h,double:s.double,triple:s.triple,hr:s.hr,rbi:s.rbi,r:s.r,so:s.so,e:s.e,runout:s.runout}}}).filter(x=>x.name||x.position||x.record)}function getPitchers(){return[...pitchersBody.querySelectorAll('.pitcher-player-card')].map(r=>{const id=r.dataset.pitcherRowId;return{name:$(`p_name_${id}`).value.trim(),decision:$(`p_decision_${id}`).value.trim(),inning:$(`p_inning_${id}`).value.trim(),runs:$(`p_runs_${id}`).value.trim(),er:$(`p_er_${id}`).value.trim(),hits:$(`p_hits_${id}`).value.trim(),hr:$(`p_hr_${id}`).value.trim(),so:$(`p_so_${id}`).value.trim(),bb:$(`p_bb_${id}`).value.trim(),era:$(`p_era_${id}`).textContent}}).filter(x=>x.name)}
async function loadLineup(){if(!gameDateInput.value||currentEditId)return;const snap=await getDoc(doc(db,'lineups',lineupId()));if(!snap.exists()){lineupNotice.textContent='해당 경기 종류/날짜로 저장된 라인업이 없습니다.';return}const l=snap.data();createBatters();(l.players||[]).forEach((p,i)=>{const row=battersBody.querySelectorAll('.batter-player-card')[i];if(!row)return;const id=row.dataset.rowId;$(`b_order_${id}`).value=p.order||i+1;$(`b_name_${id}`).value=p.name||'';$(`b_pos_${id}`).value=p.position||''});createPitchers();if(l.pitcher){const id=pitchersBody.querySelector('.pitcher-player-card').dataset.pitcherRowId;$(`p_name_${id}`).value=l.pitcher}if(l.opponent&&!opponentInput.value)opponentInput.value=l.opponent;lineupNotice.textContent=`라인업 불러오기 완료: ${gameTypeInput.value} / ${gameDateInput.value}`}
function resetForm(){currentEditId=null;gameTypeInput.value='연습경기';gameDateInput.value=today();gameTimeInput.value='';opponentInput.value='';homeAwayInput.value='';finalScoreInput.value='';gameResultInput.value='';inningCount=9;renderInningTable();createBatters();createPitchers();saveBtn.textContent='저장';loadLineup()}function summary(data){return `${data.gameType||'연습경기'} / ${data.homeAway||'-'} / ${data.finalScore||'-'} / ${data.gameResult||'-'}`}async function syncRecord(id,data){await setDoc(doc(db,'records',id),{gameType:data.gameType,date:data.gameDate,opponent:data.opponent,result:data.gameResult==='승리'?'승':data.gameResult==='패배'?'패':'무',score:data.finalScore,memo:summary(data),updatedAt:Date.now(),createdAt:data.createdAt})}
async function saveSheet(){const now=Date.now(),header=Array.from({length:inningCount},(_,i)=>String(i+1));const data={gameType:gameTypeInput.value,gameDate:gameDateInput.value.trim(),gameTime:gameTimeInput.value.trim(),opponent:opponentInput.value.trim(),homeAway:homeAwayInput.value,finalScore:finalScoreInput.value.trim(),gameResult:gameResultInput.value,innings:{header,away:getInningRow('away'),home:getInningRow('home')},batters:getBatters(),pitchers:getPitchers(),createdBy:currentUserData?.nickname||'',updatedAt:now};if(!data.gameDate||!data.opponent||!data.finalScore||!data.gameResult){alert('경기 날짜, 상대팀, 최종 스코어, 결과는 꼭 입력해주세요.');return}saveBtn.disabled=true;try{if(currentEditId){await updateDoc(doc(db,'scoresheets',currentEditId),data);await syncRecord(currentEditId,{...data,createdAt:now});alert('기록지 수정 완료!')}else{const added=await addDoc(collection(db,'scoresheets'),{...data,createdAt:now});await syncRecord(added.id,{...data,createdAt:now});alert('기록지 저장 완료!')}resetForm()}catch(e){console.error(e);alert('기록지 저장 중 오류가 발생했습니다.')}finally{saveBtn.disabled=false;saveBtn.textContent='저장'}}
function renderSheets(){sheetList.innerHTML='';if(!sheets.length){sheetList.innerHTML='<p class="empty-text">아직 저장된 기록지가 없습니다.</p>';return}sheets.forEach(s=>{const box=document.createElement('div');box.className='sheet-box';box.innerHTML=`<div class="sheet-top"><span class="game-type-badge">${s.gameType||'연습경기'}</span>${s.gameDate||'-'} ${s.gameTime||''} vs ${s.opponent||'-'} (${s.homeAway||'-'}) ${s.finalScore||'-'} ${s.gameResult||'-'}</div><button class="sheet-btn" onclick="editSheet('${s.id}')">수정</button><button class="sheet-btn delete" onclick="deleteSheet('${s.id}')">삭제</button>`;sheetList.appendChild(box)})}function fillForm(s){gameTypeInput.value=s.gameType||'연습경기';gameDateInput.value=s.gameDate||'';gameTimeInput.value=s.gameTime||'';opponentInput.value=s.opponent||'';homeAwayInput.value=s.homeAway||'';finalScoreInput.value=s.finalScore||'';gameResultInput.value=s.gameResult||'';const head=s.innings?.header||['1','2','3','4','5','6','7','8','9'];inningCount=head.length;renderInningTable(s.innings?.away||[],s.innings?.home||[]);battersBody.innerHTML='';batterRowCounter=0;(s.batters||[]).forEach(b=>battersBody.appendChild(createBatterRow({order:b.order,name:b.name,position:b.position,record:b.record,isSub:b.isSub})));if(!battersBody.children.length)createBatters();pitchersBody.innerHTML='';pitcherRowCounter=0;(s.pitchers||[]).forEach(p=>pitchersBody.appendChild(createPitcherRow(p)));if(!pitchersBody.children.length)createPitchers();refreshDeletes()}window.editSheet=id=>{const t=sheets.find(x=>x.id===id);if(!t)return;currentEditId=id;fillForm(t);saveBtn.textContent='수정 저장';scrollTo({top:0,behavior:'smooth'})};window.deleteSheet=async id=>{if(!confirm('이 기록지를 삭제할까요?'))return;await deleteDoc(doc(db,'scoresheets',id));await deleteDoc(doc(db,'records',id));if(currentEditId===id)resetForm()};window.addSubRow=id=>{const base=battersBody.querySelector(`.batter-player-card[data-row-id="${id}"]`);if(!base)return;base.after(createBatterRow({order:$(`b_order_${id}`).value.trim(),isSub:true}));refreshDeletes()};window.removeBatterRow=id=>{if(battersBody.querySelectorAll('.batter-player-card').length<=1){alert('타자는 최소 1명은 남아 있어야 합니다.');return}battersBody.querySelector(`.batter-player-card[data-row-id="${id}"]`)?.remove();refreshDeletes()};window.removePitcherRow=id=>{if(pitchersBody.querySelectorAll('.pitcher-player-card').length<=1){alert('투수는 최소 1명은 남아 있어야 합니다.');return}pitchersBody.querySelector(`.pitcher-player-card[data-pitcher-row-id="${id}"]`)?.remove();refreshDeletes()};
addInningBtn.onclick=()=>{const a=getInningRow('away'),h=getInningRow('home');inningCount++;renderInningTable(a,h)};removeInningBtn.onclick=()=>{if(inningCount<=9)return;const a=getInningRow('away').slice(0,-1),h=getInningRow('home').slice(0,-1);inningCount--;renderInningTable(a,h)};addPitcherBtn.onclick=()=>{pitchersBody.appendChild(createPitcherRow());refreshDeletes()};saveBtn.onclick=saveSheet;resetBtn.onclick=resetForm;gameDateInput.onchange=loadLineup;gameTypeInput.onchange=loadLineup;function init(){resetForm();onSnapshot(query(collection(db,'scoresheets'),orderBy('createdAt','desc')),snap=>{sheets=[];snap.forEach(d=>sheets.push({id:d.id,...d.data()}));renderSheets()},e=>{console.error(e);sheetList.innerHTML='<p class="empty-text">기록지를 불러오지 못했습니다.</p>'})}
</script>
