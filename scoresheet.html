<!DOCTYPE html>
<html lang="ko">
<head>

  <link rel="stylesheet" href="styles.css">
  <style>
    .sheet-wrap{width:95%;max-width:1280px;margin:34px auto}.sheet-card{background:#fff;border-radius:22px;padding:24px;box-shadow:0 10px 24px rgba(0,0,0,.06);margin-bottom:22px}.card-title{font-size:34px;font-weight:900;margin-bottom:10px}.sheet-note,.empty-text{color:#666;font-size:15px;line-height:1.6}.sheet-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:12px;margin-bottom:16px}.sheet-input,.sheet-select,.cell-input,.manual-input{width:100%;padding:12px 14px;border-radius:14px;border:1px solid #d6dce5;box-sizing:border-box;font-size:15px;background:#fff;font-family:inherit}.sheet-btn{padding:11px 18px;border-radius:12px;border:none;background:#111;color:#fff;cursor:pointer;margin-right:8px;margin-top:12px;font-size:15px;font-weight:800}.sheet-btn.sub{background:#666}.sheet-btn.delete{background:#b00020}.sheet-btn.small{padding:9px 12px;margin:0;font-size:13px;border-radius:10px}.sheet-btn:disabled{opacity:.35;cursor:not-allowed;background:#999}.section-title{font-size:24px;font-weight:900;margin:28px 0 14px}.hidden{display:none!important}.menu-clean{display:flex;flex-wrap:wrap;gap:12px;padding:16px 0 0}.menu-clean a{text-decoration:none;padding:10px 14px;border-radius:14px;background:#fff;border:1px solid #d6d6d6;font-size:18px}.game-type-badge{display:inline-block;padding:5px 10px;border-radius:999px;background:#e8f1ff;color:#1b65ba;font-size:13px;font-weight:800;margin-right:6px}.sheet-box{background:#f8f8f8;border-radius:16px;padding:18px;margin-bottom:16px;border-left:6px solid #1b65ba}.sheet-top{font-size:20px;font-weight:900;margin-bottom:12px;line-height:1.6}
    .inning-actions{margin-bottom:12px}.inning-table-wrap{overflow-x:auto}.inning-table{width:100%;min-width:900px;border-collapse:separate;border-spacing:0;border:1px solid #e4e8ef;border-radius:16px;overflow:hidden}.inning-table th,.inning-table td{border-right:1px solid #e4e8ef;border-bottom:1px solid #e4e8ef;padding:10px;text-align:center}.inning-table th{background:#f6f8fb;font-weight:900}.inning-table tr:last-child td,.inning-table tr:last-child th{border-bottom:none}.inning-table th:last-child,.inning-table td:last-child{border-right:none}.inning-table input{width:100%;min-width:58px;padding:9px;border-radius:12px;border:1px solid #d6dce5;text-align:center}
    .player-list{display:grid;gap:16px}.player-card{background:#fff;border:1px solid #e4eaf2;border-radius:22px;padding:18px;box-shadow:0 6px 16px rgba(0,0,0,.045)}.player-head{display:grid;grid-template-columns:84px minmax(160px,1fr) 120px;gap:12px;margin-bottom:14px}.pitcher-head{display:grid;grid-template-columns:minmax(180px,1fr) 120px;gap:12px;margin-bottom:14px}.field-label{display:block;font-size:12px;font-weight:900;color:#666;margin-bottom:6px}.player-main{display:grid;grid-template-columns:minmax(360px,1.6fr) minmax(220px,.9fr) 110px;gap:14px;align-items:start}.pitcher-main{display:grid;grid-template-columns:minmax(420px,1.7fr) minmax(220px,.9fr) 110px;gap:14px;align-items:start}.panel{background:#fbfcff;border:1px solid #e7edf5;border-radius:18px;padding:14px}.panel-title{font-size:13px;font-weight:900;color:#555;margin-bottom:10px}.manual-input{min-height:52px;resize:vertical;line-height:1.5;background:#fff}.token-area{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px}.token-area:empty{display:none}.token-chip{display:inline-flex;align-items:center;gap:6px;background:#e8f1ff;color:#1b65ba;border:1px solid #bfd7ff;border-radius:999px;padding:7px 9px;font-size:12px;font-weight:900}.token-chip.out{background:#f1f3f5;color:#555;border-color:#d8dde3}.token-chip.warn{background:#fff3e8;color:#c26b00;border-color:#ffd8ad}.token-chip.plus{background:#eaf8ef;color:#198754;border-color:#c7ebd4}.token-chip.danger{background:#fff0f0;color:#b00020;border-color:#ffc9c9}.token-x{border:none;background:rgba(255,255,255,.75);color:inherit;font-size:14px;line-height:1;cursor:pointer;padding:1px 5px;margin:0;border-radius:999px;font-weight:900}.quick-group{margin-top:12px}.quick-title{font-size:12px;font-weight:900;margin:0 0 8px;color:#555}.quick-row{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px}.quick-row.pitcher{grid-template-columns:repeat(4,minmax(0,1fr))}.quick-btn{padding:10px 7px;border:1px solid #d8e2ef;border-radius:12px;background:#fff;color:#222;font-size:12px;font-weight:900;cursor:pointer;margin:0;min-height:40px}.quick-btn.hit{background:#edf5ff;color:#1b65ba;border-color:#bfd7ff}.quick-btn.out{background:#f4f5f7;color:#555;border-color:#d8dde3}.quick-btn.plus{background:#eefaf2;color:#198754;border-color:#c7ebd4}.quick-btn.warn{background:#fff6ed;color:#c26b00;border-color:#ffd8ad}.quick-btn.danger{background:#fff2f2;color:#b00020;border-color:#ffc9c9}.stat-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.stat-pill{background:#fff;border:1px solid #e3e8ef;border-radius:12px;padding:9px 10px;font-size:12px;color:#666}.stat-pill b{display:block;font-size:16px;margin-top:3px;color:#111}.stat-pill.wide{grid-column:1/-1}.pitcher-fields{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}.pitcher-fields input{padding:10px;font-size:13px}.card-actions{display:flex;flex-direction:column;gap:8px}.delete-hint{font-size:11px;color:#777;line-height:1.35}.sub-row{background:#fcfcfc}
    @media(max-width:1020px){.player-main,.pitcher-main{grid-template-columns:1fr}.card-actions{flex-direction:row;align-items:center}.quick-row{grid-template-columns:repeat(3,1fr)}.quick-row.pitcher,.pitcher-fields{grid-template-columns:repeat(2,1fr)}}@media(max-width:640px){.player-head,.pitcher-head{grid-template-columns:1fr}.quick-row,.quick-row.pitcher,.pitcher-fields,.stat-grid{grid-template-columns:repeat(2,1fr)}.sheet-card{padding:18px}.card-title{font-size:28px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top-title"><h1>레이 마린스</h1><a class="top-link" href="index.html">메인으로</a></div>
    <div class="menu-clean">
      <a href="lineup.html">라인업</a><a href="record.html">기록실</a><a href="scoresheet.html">기록지</a><a href="mypage.html">마이페이지</a>
    </div>
  </div>

  <div class="sheet-wrap">
    <div class="sheet-card">
      <div class="card-title">기록지 작성 / 수정</div>
      <p class="sheet-note">경기 종류와 날짜를 맞추면 저장된 라인업을 자동으로 불러옵니다.</p>
      <div class="sheet-grid">
        <div><label for="gameType">경기 종류</label><select id="gameType" class="sheet-select"><option value="연습경기">연습경기</option><option value="리그경기">리그경기</option></select></div>
        <div><label for="gameDate">경기 날짜</label><input id="gameDate" type="date" class="sheet-input"></div>
        <div><label for="gameTime">경기 시간</label><input id="gameTime" class="sheet-input" placeholder="예: 20시"></div>
        <div><label for="opponent">상대팀</label><input id="opponent" class="sheet-input" placeholder="예: 오버드라이브"></div>
        <div><label for="homeAway">홈 / 원정</label><select id="homeAway" class="sheet-select"><option value="">선택</option><option value="홈">홈</option><option value="원정">원정</option></select></div>
        <div><label for="finalScore">최종 스코어</label><input id="finalScore" class="sheet-input" placeholder="예: 5:2"></div>
        <div><label for="gameResult">결과</label><select id="gameResult" class="sheet-select"><option value="">선택</option><option value="승리">승리</option><option value="패배">패배</option><option value="무승부">무승부</option></select></div>
      </div>
      <p id="lineupNotice" class="sheet-note">라인업 불러오기 대기 중...</p>

      <div class="section-title">이닝 점수</div>
      <div class="inning-actions"><button type="button" id="addInningBtn" class="sheet-btn sub">연장 이닝 추가</button><button type="button" id="removeInningBtn" class="sheet-btn sub">마지막 이닝 삭제</button></div>
      <div class="inning-table-wrap"><table class="inning-table"><thead id="inningHead"></thead><tbody id="inningBody"></tbody></table></div>

      <div class="section-title">타자 기록</div>
      <div id="battersBody" class="player-list"></div>

      <div class="section-title">투수 기록</div>
      <button type="button" id="addPitcherBtn" class="sheet-btn sub">투수 추가</button>
      <div id="pitchersBody" class="player-list" style="margin-top:14px"></div>

      <button id="saveBtn" class="sheet-btn">저장</button><button id="resetBtn" class="sheet-btn sub">초기화</button>
    </div>

    <div class="sheet-card"><div class="card-title">저장된 기록지</div><div id="sheetList"><p class="empty-text">기록지를 불러오는 중...</p></div></div>
  </div>

<script type="module">
import { db } from './firebase-config.js';
import { checkLogin, isStaff } from './auth.js';
import { collection, addDoc, updateDoc, deleteDoc, setDoc, doc, getDoc, onSnapshot, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js';

const $=id=>document.getElementById(id);
const gameTypeInput=$('gameType'), gameDateInput=$('gameDate'), gameTimeInput=$('gameTime'), opponentInput=$('opponent'), homeAwayInput=$('homeAway'), finalScoreInput=$('finalScore'), gameResultInput=$('gameResult');
const saveBtn=$('saveBtn'), resetBtn=$('resetBtn'), addInningBtn=$('addInningBtn'), removeInningBtn=$('removeInningBtn'), addPitcherBtn=$('addPitcherBtn');
const battersBody=$('battersBody'), pitchersBody=$('pitchersBody'), inningHead=$('inningHead'), inningBody=$('inningBody'), sheetList=$('sheetList'), lineupNotice=$('lineupNotice');
let currentUserData=null, currentEditId=null, sheets=[], batterRowCounter=0, pitcherRowCounter=0, inningCount=9;

checkLogin((user,userData)=>{ currentUserData=userData; if(!isStaff(userData)){ alert('기록지는 관리자 또는 기록원만 접근할 수 있습니다.'); location.href='record.html'; return; } init(); });
function today(){const n=new Date();return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`}
function lineupId(){return `${gameTypeInput.value}_${gameDateInput.value}`}
function renderInningTable(away=[],home=[]){let h='<tr><th>팀</th>';for(let i=1;i<=inningCount;i++)h+=`<th>${i}</th>`;h+='</tr>';inningHead.innerHTML=h;let a='<tr><th>상대팀</th>', m='<tr><th>우리팀</th>';for(let i=1;i<=inningCount;i++){a+=`<td><input id="away${i}" value="${away[i-1]||''}"></td>`;m+=`<td><input id="home${i}" value="${home[i-1]||''}"></td>`}inningBody.innerHTML=a+'</tr>'+m+'</tr>'}
function getInningRow(prefix){return Array.from({length:inningCount},(_,i)=>$(`${prefix}${i+1}`).value.trim())}
function tokenClass(v){if(['삼진','뜬공','땅볼','병살','주루사'].includes(v))return'out';if(['타점','득점'].includes(v))return'plus';if(['실책','볼넷','사구'].includes(v))return'warn';return'hit'}
function known(v){return ['안타','1루타','2루타','3루타','홈런','삼진','뜬공','땅볼','병살','볼넷','사구','타점','득점','실책','주루사'].includes(v)}
function getRecordTokens(id){return ($(`b_tokens_${id}`).dataset.tokens||'').split('|').filter(Boolean)}
function setRecordTokens(id,tokens){$(`b_tokens_${id}`).dataset.tokens=tokens.join('|');$(`b_tokens_${id}`).innerHTML=tokens.map((t,i)=>`<span class="token-chip ${tokenClass(t)}">${t}<button type="button" class="token-x" onclick="removeBatterToken(${id},${i})">×</button></span>`).join('');updateBatter(id)}
function getRecordText(id){return [...getRecordTokens(id), ...$(`b_manual_${id}`).value.trim().split(/\s+/).filter(Boolean)].join(' ')}
window.addBatterToken=(id,t)=>setRecordTokens(id,[...getRecordTokens(id),t]);
window.removeBatterToken=(id,idx)=>{const t=getRecordTokens(id);t.splice(idx,1);setRecordTokens(id,t)};
function batterStats(text){const tokens=String(text||'').trim().split(/\s+/).filter(Boolean);const c=w=>tokens.filter(x=>x===w).length;const single=c('안타')+c('1루타'), dbl=c('2루타'), tri=c('3루타'), hr=c('홈런'), so=c('삼진');const out=c('뜬공')+c('땅볼')+c('병살')+c('주루사');return{ab:single+dbl+tri+hr+so+out,h:single+dbl+tri+hr,double:dbl,triple:tri,hr,rbi:c('타점'),r:c('득점'),so,e:c('실책'),runout:c('주루사'),bb:c('볼넷'),hbp:c('사구')}};
function updateBatter(id){const s=batterStats(getRecordText(id));$(`b_summary_${id}`).innerHTML=`<div class="stat-grid"><div class="stat-pill">타수<b>${s.ab}</b></div><div class="stat-pill">안타<b>${s.h}</b></div><div class="stat-pill">2루타<b>${s.double}</b></div><div class="stat-pill">3루타<b>${s.triple}</b></div><div class="stat-pill">홈런<b>${s.hr}</b></div><div class="stat-pill">타점<b>${s.rbi}</b></div><div class="stat-pill">득점<b>${s.r}</b></div><div class="stat-pill">삼진<b>${s.so}</b></div><div class="stat-pill">실책<b>${s.e}</b></div><div class="stat-pill">주루사<b>${s.runout}</b></div></div>`}
function batterButtons(id){const groups=[['안타',['안타','2루타','3루타','홈런']],['출루·아웃',['볼넷','사구','삼진','뜬공','땅볼','병살']],['추가 기록',['타점','득점','실책','주루사']]];return groups.map(g=>`<div class="quick-group"><p class="quick-title">${g[0]}</p><div class="quick-row">${g[1].map(t=>`<button type="button" class="quick-btn ${tokenClass(t)}" onclick="addBatterToken(${id},'${t}')">${t}</button>`).join('')}</div></div>`).join('')}
function createBatterRow(data={}){batterRowCounter++;const id=batterRowCounter, card=document.createElement('div');card.className='player-card batter-player-card';if(data.isSub)card.classList.add('sub-row');card.dataset.rowId=id;card.innerHTML=`<div class="player-head"><div><span class="field-label">타순</span><input id="b_order_${id}" class="cell-input" value="${data.order||''}"></div><div><span class="field-label">선수명</span><input id="b_name_${id}" class="cell-input" value="${data.name||''}" placeholder="선수명"></div><div><span class="field-label">포지션</span><input id="b_pos_${id}" class="cell-input" value="${data.position||''}" placeholder="CF"></div></div><div class="player-main"><div class="panel"><div class="panel-title">기록 입력</div><div id="b_tokens_${id}" class="token-area" data-tokens=""></div><textarea id="b_manual_${id}" class="manual-input" placeholder="직접 입력도 가능"></textarea><div class="quick-group">${batterButtons(id)}</div></div><div class="panel"><div class="panel-title">자동 계산</div><div id="b_summary_${id}"></div></div><div class="card-actions"><button type="button" class="sheet-btn small sub" onclick="addSubRow(${id})">교체</button><button type="button" class="sheet-btn small delete batter-delete-btn" onclick="removeBatterRow(${id})">삭제</button><span class="delete-hint">1명만 남으면 삭제 불가</span></div></div>`;const parts=String(data.record||'').trim().split(/\s+/).filter(Boolean);if(parts.length){setRecordTokens(id,parts.filter(known));$(`b_manual_${id}`).value=parts.filter(x=>!known(x)).join(' ')}$(`b_manual_${id}`).addEventListener('input',()=>updateBatter(id));setTimeout(()=>{updateBatter(id);refreshDeletes()},0);return card}
function pVal(id,f){return Number($(`p_${f}_${id}`).value)||0}function incPitcher(id,f,delta,label){$(`p_${f}_${id}`).value=pVal(id,f)+delta;const area=$(`p_token_area_${id}`), idx=area.children.length;const chip=document.createElement('span');chip.className=`token-chip ${tokenClass(label)}`;chip.dataset.field=f;chip.dataset.delta=delta;chip.innerHTML=`${label}<button type="button" class="token-x">×</button>`;chip.querySelector('button').onclick=()=>{ $(`p_${f}_${id}`).value=Math.max(0,pVal(id,f)-delta); chip.remove(); updatePitcher(id); };area.appendChild(chip);updatePitcher(id)}window.incPitcher=incPitcher;
function outsToInning(outs){return `${Math.floor(outs/3)}.${outs%3}`}function inningToOuts(v){const s=String(v||'').trim();if(!s)return 0;if(!s.includes('.'))return (Number(s)||0)*3;const [a,b]=s.split('.');return (Number(a)||0)*3+(Number(b)||0)}function calcEra(inn,er){const outs=inningToOuts(inn), e=Number(er)||0;if(!outs)return'0.00';return ((e*9)/(outs/3)).toFixed(2)}
function updatePitcher(id){const era=calcEra($(`p_inning_${id}`).value,$(`p_er_${id}`).value);$(`p_era_${id}`).textContent=era;$(`p_summary_${id}`).innerHTML=`<div class="stat-grid"><div class="stat-pill">이닝<b>${$(`p_inning_${id}`).value||'0'}</b></div><div class="stat-pill">ERA<b>${era}</b></div><div class="stat-pill">실점<b>${pVal(id,'runs')}</b></div><div class="stat-pill">자책<b>${pVal(id,'er')}</b></div><div class="stat-pill">피안타<b>${pVal(id,'hits')}</b></div><div class="stat-pill">피홈런<b>${pVal(id,'hr')}</b></div><div class="stat-pill">탈삼진<b>${pVal(id,'so')}</b></div><div class="stat-pill">사사구<b>${pVal(id,'bb')}</b></div></div>`}
function pitcherButtons(id){return `<div class="quick-group"><p class="quick-title">이닝</p><div class="quick-row pitcher"><button type="button" class="quick-btn hit" onclick="incPitcher(${id},'inningOuts',1,'+1아웃');document.getElementById('p_inning_${id}').value=outsToInning(pVal(${id},'inningOuts'))">+1아웃</button><button type="button" class="quick-btn hit" onclick="incPitcher(${id},'inningOuts',3,'+1이닝');document.getElementById('p_inning_${id}').value=outsToInning(pVal(${id},'inningOuts'))">+1이닝</button></div></div><div class="quick-group"><p class="quick-title">투구 기록</p><div class="quick-row pitcher"><button type="button" class="quick-btn plus" onclick="incPitcher(${id},'so',1,'삼진')">+삼진</button><button type="button" class="quick-btn warn" onclick="incPitcher(${id},'runs',1,'실점')">+실점</button><button type="button" class="quick-btn warn" onclick="incPitcher(${id},'er',1,'자책')">+자책</button><button type="button" class="quick-btn danger" onclick="incPitcher(${id},'hits',1,'피안타')">+피안타</button><button type="button" class="quick-btn danger" onclick="incPitcher(${id},'hr',1,'피홈런')">+피홈런</button><button type="button" class="quick-btn warn" onclick="incPitcher(${id},'bb',1,'사사구')">+사사구</button></div></div>`}
function createPitcherRow(data={}){pitcherRowCounter++;const id=pitcherRowCounter,card=document.createElement('div');card.className='player-card pitcher-player-card';card.dataset.pitcherRowId=id;card.innerHTML=`<div class="pitcher-head"><div><span class="field-label">투수명</span><input id="p_name_${id}" class="cell-input" value="${data.name||''}" placeholder="투수명"></div><div><span class="field-label">결과</span><input id="p_decision_${id}" class="cell-input" value="${data.decision||''}" placeholder="승/패/홀드"></div></div><div class="pitcher-main"><div class="panel"><div class="panel-title">투수 기록</div><div id="p_token_area_${id}" class="token-area"></div><input type="hidden" id="p_inningOuts_${id}" value="${inningToOuts(data.inning||'')}"><div class="pitcher-fields"><label>이닝<input id="p_inning_${id}" class="cell-input" value="${data.inning||''}"></label><label>실점<input id="p_runs_${id}" class="cell-input" value="${data.runs||''}"></label><label>자책<input id="p_er_${id}" class="cell-input" value="${data.er||''}"></label><label>피안타<input id="p_hits_${id}" class="cell-input" value="${data.hits||''}"></label><label>피홈런<input id="p_hr_${id}" class="cell-input" value="${data.hr||''}"></label><label>탈삼진<input id="p_so_${id}" class="cell-input" value="${data.so||''}"></label><label>사사구<input id="p_bb_${id}" class="cell-input" value="${data.bb||''}"></label></div>${pitcherButtons(id)}</div><div class="panel"><div class="panel-title">요약</div><div id="p_summary_${id}"></div><div id="p_era_${id}" style="display:none">0.00</div></div><div class="card-actions"><button type="button" class="sheet-btn small delete pitcher-delete-btn" onclick="removePitcherRow(${id})">삭제</button><span class="delete-hint">1명만 남으면 삭제 불가</span></div></div>`;['inning','runs','er','hits','hr','so','bb','decision'].forEach(f=>$(`p_${f}_${id}`).addEventListener('input',()=>updatePitcher(id)));setTimeout(()=>{updatePitcher(id);refreshDeletes()},0);return card}
function refreshDeletes(){battersBody.querySelectorAll('.batter-delete-btn').forEach(b=>b.disabled=battersBody.querySelectorAll('.batter-player-card').length<=1);pitchersBody.querySelectorAll('.pitcher-delete-btn').forEach(b=>b.disabled=pitchersBody.querySelectorAll('.pitcher-player-card').length<=1)}
function createBatters(){battersBody.innerHTML='';batterRowCounter=0;for(let i=1;i<=9;i++)battersBody.appendChild(createBatterRow({order:i}));refreshDeletes()}function createPitchers(){pitchersBody.innerHTML='';pitcherRowCounter=0;pitchersBody.appendChild(createPitcherRow());refreshDeletes()}
function getBatters(){return[...battersBody.querySelectorAll('.batter-player-card')].map(row=>{const id=row.dataset.rowId,record=getRecordText(id),s=batterStats(record);return{order:$(`b_order_${id}`).value.trim(),name:$(`b_name_${id}`).value.trim(),position:$(`b_pos_${id}`).value.trim(),record,isSub:row.classList.contains('sub-row'),stats:{ab:s.ab,h:s.h,double:s.double,triple:s.triple,hr:s.hr,rbi:s.rbi,r:s.r,so:s.so,e:s.e,runout:s.runout,bb:s.bb,hbp:s.hbp}}}).filter(x=>x.name||x.position||x.record)}
function getPitchers(){return[...pitchersBody.querySelectorAll('.pitcher-player-card')].map(row=>{const id=row.dataset.pitcherRowId;return{name:$(`p_name_${id}`).value.trim(),decision:$(`p_decision_${id}`).value.trim(),inning:$(`p_inning_${id}`).value.trim(),runs:$(`p_runs_${id}`).value.trim(),er:$(`p_er_${id}`).value.trim(),hits:$(`p_hits_${id}`).value.trim(),hr:$(`p_hr_${id}`).value.trim(),so:$(`p_so_${id}`).value.trim(),bb:$(`p_bb_${id}`).value.trim(),era:$(`p_era_${id}`).textContent}}).filter(x=>x.name)}
async function loadLineup(){if(!gameDateInput.value||currentEditId)return;const snap=await getDoc(doc(db,'lineups',lineupId()));if(!snap.exists()){lineupNotice.textContent='해당 경기 종류/날짜로 저장된 라인업이 없습니다.';return}const l=snap.data();createBatters();(l.players||[]).forEach((p,i)=>{const row=battersBody.querySelectorAll('.batter-player-card')[i];if(!row)return;const id=row.dataset.rowId;$(`b_order_${id}`).value=p.order||i+1;$(`b_name_${id}`).value=p.name||'';$(`b_pos_${id}`).value=p.position||''});createPitchers();if(l.pitcher){const id=pitchersBody.querySelector('.pitcher-player-card').dataset.pitcherRowId;$(`p_name_${id}`).value=l.pitcher}if(l.opponent&&!opponentInput.value)opponentInput.value=l.opponent;lineupNotice.textContent=`라인업 불러오기 완료: ${gameTypeInput.value} / ${gameDateInput.value}`}
function resetForm(){currentEditId=null;gameTypeInput.value='연습경기';gameDateInput.value=today();gameTimeInput.value='';opponentInput.value='';homeAwayInput.value='';finalScoreInput.value='';gameResultInput.value='';inningCount=9;renderInningTable();createBatters();createPitchers();saveBtn.textContent='저장';loadLineup()}
function buildSummary(data){return `${data.gameType||'연습경기'} / ${data.homeAway||'-'} / ${data.finalScore||'-'} / ${data.gameResult||'-'}`}async function syncRecord(id,data){await setDoc(doc(db,'records',id),{gameType:data.gameType,date:data.gameDate,opponent:data.opponent,result:data.gameResult==='승리'?'승':data.gameResult==='패배'?'패':'무',score:data.finalScore,memo:buildSummary(data),updatedAt:Date.now(),createdAt:data.createdAt})}
async function saveSheet(){const now=Date.now(),header=Array.from({length:inningCount},(_,i)=>String(i+1));const data={gameType:gameTypeInput.value,gameDate:gameDateInput.value.trim(),gameTime:gameTimeInput.value.trim(),opponent:opponentInput.value.trim(),homeAway:homeAwayInput.value,finalScore:finalScoreInput.value.trim(),gameResult:gameResultInput.value,innings:{header,away:getInningRow('away'),home:getInningRow('home')},batters:getBatters(),pitchers:getPitchers(),createdBy:currentUserData?.nickname||'',updatedAt:now};if(!data.gameDate||!data.opponent||!data.finalScore||!data.gameResult){alert('경기 날짜, 상대팀, 최종 스코어, 결과는 꼭 입력해주세요.');return}saveBtn.disabled=true;try{if(currentEditId){await updateDoc(doc(db,'scoresheets',currentEditId),data);await syncRecord(currentEditId,{...data,createdAt:now});alert('기록지 수정 완료!')}else{const added=await addDoc(collection(db,'scoresheets'),{...data,createdAt:now});await syncRecord(added.id,{...data,createdAt:now});alert('기록지 저장 완료!')}resetForm()}catch(e){console.error(e);alert('기록지 저장 중 오류가 발생했습니다.')}finally{saveBtn.disabled=false;saveBtn.textContent='저장'}}
function renderSheets(){sheetList.innerHTML='';if(!sheets.length){sheetList.innerHTML='<p class="empty-text">아직 저장된 기록지가 없습니다.</p>';return}sheets.forEach(s=>{const box=document.createElement('div');box.className='sheet-box';box.innerHTML=`<div class="sheet-top"><span class="game-type-badge">${s.gameType||'연습경기'}</span>${s.gameDate||'-'} ${s.gameTime||''} vs ${s.opponent||'-'} (${s.homeAway||'-'}) ${s.finalScore||'-'} ${s.gameResult||'-'}</div><button class="sheet-btn" onclick="editSheet('${s.id}')">수정</button><button class="sheet-btn delete" onclick="deleteSheet('${s.id}')">삭제</button>`;sheetList.appendChild(box)})}
function fillForm(s){gameTypeInput.value=s.gameType||'연습경기';gameDateInput.value=s.gameDate||'';gameTimeInput.value=s.gameTime||'';opponentInput.value=s.opponent||'';homeAwayInput.value=s.homeAway||'';finalScoreInput.value=s.finalScore||'';gameResultInput.value=s.gameResult||'';inningCount=(s.innings?.header||['1','2','3','4','5','6','7','8','9']).length;renderInningTable(s.innings?.away||[],s.innings?.home||[]);battersBody.innerHTML='';batterRowCounter=0;(s.batters||[]).forEach(b=>battersBody.appendChild(createBatterRow({order:b.order,name:b.name,position:b.position,record:b.record,isSub:b.isSub})));if(!battersBody.children.length)createBatters();pitchersBody.innerHTML='';pitcherRowCounter=0;(s.pitchers||[]).forEach(p=>pitchersBody.appendChild(createPitcherRow(p)));if(!pitchersBody.children.length)createPitchers();refreshDeletes()}
window.editSheet=id=>{const t=sheets.find(x=>x.id===id);if(!t)return;currentEditId=id;fillForm(t);saveBtn.textContent='수정 저장';scrollTo({top:0,behavior:'smooth'})};window.deleteSheet=async id=>{if(!confirm('이 기록지를 삭제할까요?'))return;await deleteDoc(doc(db,'scoresheets',id));await deleteDoc(doc(db,'records',id));if(currentEditId===id)resetForm()};window.addSubRow=id=>{const base=battersBody.querySelector(`.batter-player-card[data-row-id="${id}"]`);if(!base)return;base.after(createBatterRow({order:$(`b_order_${id}`).value.trim(),isSub:true}));refreshDeletes()};window.removeBatterRow=id=>{if(battersBody.querySelectorAll('.batter-player-card').length<=1){alert('타자는 최소 1명은 남아 있어야 합니다.');return}battersBody.querySelector(`.batter-player-card[data-row-id="${id}"]`)?.remove();refreshDeletes()};window.removePitcherRow=id=>{if(pitchersBody.querySelectorAll('.pitcher-player-card').length<=1){alert('투수는 최소 1명은 남아 있어야 합니다.');return}pitchersBody.querySelector(`.pitcher-player-card[data-pitcher-row-id="${id}"]`)?.remove();refreshDeletes()};
addInningBtn.onclick=()=>{const a=getInningRow('away'),h=getInningRow('home');inningCount++;renderInningTable(a,h)};removeInningBtn.onclick=()=>{if(inningCount<=9)return;const a=getInningRow('away').slice(0,-1),h=getInningRow('home').slice(0,-1);inningCount--;renderInningTable(a,h)};addPitcherBtn.onclick=()=>{pitchersBody.appendChild(createPitcherRow());refreshDeletes()};saveBtn.onclick=saveSheet;resetBtn.onclick=resetForm;gameDateInput.onchange=loadLineup;gameTypeInput.onchange=loadLineup;function init(){resetForm();onSnapshot(query(collection(db,'scoresheets'),orderBy('createdAt','desc')),snap=>{sheets=[];snap.forEach(d=>sheets.push({id:d.id,...d.data()}));renderSheets()},e=>{console.error(e);sheetList.innerHTML='<p class="empty-text">기록지를 불러오지 못했습니다.</p>'})}
</script>
</body>
</html>
