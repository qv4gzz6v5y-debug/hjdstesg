<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>기록지</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .sheet-wrap{width:95%;max-width:1300px;margin:34px auto}.sheet-card{background:white;border-radius:18px;padding:24px;box-shadow:0 8px 20px rgba(0,0,0,.06);margin-bottom:22px}.card-title{font-size:34px;font-weight:800;margin-bottom:16px}.sheet-note,.empty-text{color:#666;font-size:15px;line-height:1.6}.sheet-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:14px}.sheet-input,.sheet-select,.cell-input{width:100%;padding:12px 14px;margin:8px 0;border-radius:12px;border:1px solid #ccc;box-sizing:border-box;font-size:16px;background:#fff}.cell-input{margin:0;padding:8px 10px;border-radius:8px;font-size:14px;text-align:center;min-width:52px}.sheet-btn{padding:11px 18px;border-radius:10px;border:none;background:#111;color:white;cursor:pointer;margin-right:8px;margin-top:12px;font-size:15px}.sheet-btn.sub{background:#666}.sheet-btn.delete{background:#b00020}.sheet-btn.small{padding:7px 10px;margin:2px;font-size:12px;border-radius:8px}.sheet-btn:disabled{opacity:.35;cursor:not-allowed;background:#999}.sheet-table-wrap{overflow-x:auto;margin-bottom:18px}.sheet-table{width:100%;border-collapse:collapse;background:white;min-width:980px}.sheet-table th,.sheet-table td{border:1px solid #ddd;padding:8px;text-align:center;vertical-align:top}.sheet-table th{background:#f7f7f7;font-weight:700;font-size:14px}.section-title{font-size:22px;font-weight:700;margin-top:24px;margin-bottom:10px}.sheet-box{background:#f8f8f8;border-radius:14px;padding:18px;margin-bottom:16px;border-left:6px solid #1b65ba}.sheet-top{font-size:20px;font-weight:800;margin-bottom:12px;line-height:1.6}.hidden{display:none!important}.sub-row{background:#fcfcfc}.inning-actions,.section-actions{margin-bottom:10px}.game-type-badge{display:inline-block;padding:5px 10px;border-radius:999px;background:#e8f1ff;color:#1b65ba;font-size:13px;font-weight:700;margin-right:6px}.menu-clean{display:flex;flex-wrap:wrap;gap:12px;padding:16px 0 0}.menu-clean a{text-decoration:none;padding:10px 14px;border-radius:14px;background:#fff;border:1px solid #d6d6d6;font-size:18px}

    .record-editor{min-width:360px;text-align:left}.record-input{margin-bottom:8px;text-align:left}.token-area{display:flex;flex-wrap:wrap;gap:6px;min-height:38px;padding:8px;border:1px solid #dfe5ee;border-radius:12px;background:#f8fafc;margin-bottom:10px}.token-chip{display:inline-flex;align-items:center;gap:6px;background:#e8f1ff;color:#1b65ba;border:1px solid #bfd7ff;border-radius:999px;padding:6px 8px;font-size:12px;font-weight:800}.token-chip.out{background:#f1f3f5;color:#555;border-color:#d8dde3}.token-chip.warn{background:#fff3e8;color:#c26b00;border-color:#ffd8ad}.token-chip.plus{background:#eaf8ef;color:#198754;border-color:#c7ebd4}.token-x{border:none;background:transparent;color:inherit;font-size:14px;line-height:1;cursor:pointer;padding:0;margin:0;font-weight:900}.quick-panel{background:#fff;border:1px solid #e1e6ee;border-radius:14px;padding:12px}.quick-group{margin-bottom:12px}.quick-group:last-child{margin-bottom:0}.quick-title{font-size:12px;font-weight:900;margin:0 0 7px;color:#333}.quick-row{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}.quick-row.pitcher{grid-template-columns:repeat(3,1fr)}.quick-btn{padding:9px 6px;border:1px solid #d8e2ef;border-radius:10px;background:white;color:#222;font-size:12px;font-weight:800;cursor:pointer;margin:0}.quick-btn.hit{background:#e8f1ff;color:#1b65ba;border-color:#bfd7ff}.quick-btn.out{background:#f1f3f5;color:#555;border-color:#d8dde3}.quick-btn.plus{background:#eaf8ef;color:#198754;border-color:#c7ebd4}.quick-btn.warn{background:#fff3e8;color:#c26b00;border-color:#ffd8ad}.quick-btn.danger{background:#fff0f0;color:#b00020;border-color:#ffc9c9}.stat-summary{min-width:190px;background:#f8fafc;border:1px solid #e1e6ee;border-radius:14px;padding:10px;text-align:left}.stat-summary strong{font-size:14px}.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-top:8px}.stat-pill{background:white;border:1px solid #e3e8ef;border-radius:10px;padding:7px;font-size:12px}.stat-pill b{display:block;font-size:15px;margin-top:2px}.pitcher-card{min-width:420px;text-align:left}.pitcher-fields{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:8px}.pitcher-fields label{font-size:12px;font-weight:800;color:#555}.pitcher-fields input{margin-top:4px}.pitcher-summary{background:#f8fafc;border:1px solid #e1e6ee;border-radius:14px;padding:10px;text-align:left;min-width:180px}.pitcher-table{min-width:1080px}.delete-hint{display:block;font-size:11px;color:#777;margin-top:6px}@media(max-width:760px){.quick-row,.quick-row.pitcher,.pitcher-fields{grid-template-columns:repeat(2,1fr)}.record-editor,.pitcher-card{min-width:300px}.sheet-table{min-width:900px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top-title"><h1>레이 마린스</h1><a class="top-link" href="index.html">메인으로</a></div>
    <div class="menu-clean">
      <a href="lineup.html">라인업</a>
      <a href="record.html">기록실</a>
      <a href="scoresheet.html">기록지</a>
      <a href="mypage.html">마이페이지</a>
    </div>
  </div>

  <div class="sheet-wrap">
    <div class="sheet-card">
      <div class="card-title">기록지</div>
      <p class="sheet-note">버튼으로 추가한 기록은 칩 형태로 표시됩니다. 칩의 ×를 누르면 해당 기록만 삭제됩니다.</p>
    </div>

    <div id="editCard" class="sheet-card hidden">
      <div class="card-title">기록지 작성 / 수정</div>
      <div class="sheet-grid">
        <div><label for="gameType">경기 종류</label><select id="gameType" class="sheet-select"><option value="연습경기">연습경기</option><option value="리그경기">리그경기</option></select></div>
        <div><label for="gameDate">경기 날짜</label><input id="gameDate" type="date" class="sheet-input"></div>
        <div><label for="gameTime">경기 시간</label><input id="gameTime" class="sheet-input" placeholder="예: 20시"></div>
        <div><label for="opponent">상대팀</label><input id="opponent" class="sheet-input" placeholder="예: 오버드라이브"></div>
        <div><label for="homeAway">홈 / 원정</label><select id="homeAway" class="sheet-select"><option value="">선택</option><option value="홈">홈</option><option value="원정">원정</option></select></div>
        <div><label for="finalScore">최종 스코어</label><input id="finalScore" class="sheet-input" placeholder="예: 5:2"></div>
        <div><label for="gameResult">결과</label><select id="gameResult" class="sheet-select"><option value="">선택</option><option value="승리">승리</option><option value="패배">패배</option><option value="무승부">무승부</option></select></div>
      </div>
      <p id="lineupNotice" class="sheet-note">라인업 불러오기 대기 중...</p>

      <div class="section-title">이닝 점수</div>
      <div class="inning-actions"><button type="button" id="addInningBtn" class="sheet-btn sub">연장 이닝 추가</button><button type="button" id="removeInningBtn" class="sheet-btn sub">마지막 이닝 삭제</button></div>
      <div class="sheet-table-wrap"><table class="sheet-table"><thead id="inningHead"></thead><tbody id="inningBody"></tbody></table></div>

      <div class="section-title">타자 기록</div>
      <div class="sheet-table-wrap"><table class="sheet-table"><thead><tr><th>타순</th><th>선수명</th><th>포지션</th><th>기록 입력</th><th>자동 계산</th><th>기능</th></tr></thead><tbody id="battersBody"></tbody></table></div>

      <div class="section-title">투수 기록</div>
      <div class="section-actions"><button type="button" id="addPitcherBtn" class="sheet-btn sub">투수 추가</button></div>
      <div class="sheet-table-wrap"><table class="sheet-table pitcher-table"><thead><tr><th>선수명</th><th>기록 입력</th><th>요약</th><th>기능</th></tr></thead><tbody id="pitchersBody"></tbody></table></div>

      <button id="saveBtn" class="sheet-btn">저장</button><button id="resetBtn" class="sheet-btn sub">초기화</button>
    </div>

    <div class="sheet-card"><div class="card-title">저장된 기록지</div><div id="sheetList"><p class="empty-text">기록지를 불러오는 중...</p></div></div>
  </div>

  <script type="module">
    import { db } from "./firebase-config.js";
    import { checkLogin, isStaff } from "./auth.js";
    import { collection, addDoc, updateDoc, deleteDoc, setDoc, doc, getDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const editCard=document.getElementById("editCard"),gameTypeInput=document.getElementById("gameType"),gameDateInput=document.getElementById("gameDate"),gameTimeInput=document.getElementById("gameTime"),opponentInput=document.getElementById("opponent"),homeAwayInput=document.getElementById("homeAway"),finalScoreInput=document.getElementById("finalScore"),gameResultInput=document.getElementById("gameResult"),saveBtn=document.getElementById("saveBtn"),resetBtn=document.getElementById("resetBtn"),addInningBtn=document.getElementById("addInningBtn"),removeInningBtn=document.getElementById("removeInningBtn"),addPitcherBtn=document.getElementById("addPitcherBtn"),sheetList=document.getElementById("sheetList"),battersBody=document.getElementById("battersBody"),pitchersBody=document.getElementById("pitchersBody"),inningHead=document.getElementById("inningHead"),inningBody=document.getElementById("inningBody"),lineupNotice=document.getElementById("lineupNotice");
    let currentEditId=null,sheets=[],batterRowCounter=0,pitcherRowCounter=0,inningCount=9,currentUserData=null;

    checkLogin((user,userData)=>{currentUserData=userData;if(!isStaff(userData)){alert("기록지는 관리자 또는 기록원만 작성할 수 있습니다.");location.href="record.html";return;}editCard.classList.remove("hidden");init();});

    function getDefaultDate(){const n=new Date();return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,"0")}-${String(n.getDate()).padStart(2,"0")}`;}
    function getLineupId(gameType,date){return `${gameType}_${date}`;}

    function renderInningTable(awayValues=[],homeValues=[]){let h=`<tr><th>팀</th>`;for(let i=1;i<=inningCount;i++)h+=`<th>${i}</th>`;h+=`</tr>`;inningHead.innerHTML=h;let a=`<tr><th>상대팀</th>`,home=`<tr><th>우리팀</th>`;for(let i=1;i<=inningCount;i++){a+=`<td><input id="away${i}" class="cell-input" value="${awayValues[i-1]||""}"></td>`;home+=`<td><input id="home${i}" class="cell-input" value="${homeValues[i-1]||""}"></td>`;}inningBody.innerHTML=a+`</tr>`+home+`</tr>`;}

    function getTokensFromInput(id){const v=document.getElementById(id).value.trim();return v?v.split(/\s+/).filter(Boolean):[];}
    function setTokensToInput(id,tokens){document.getElementById(id).value=tokens.join(" ");}
    function tokenClass(token){if(["삼진","땅볼","뜬공","병살타"].includes(token))return"out";if(["볼넷","사구","희생플라이"].includes(token))return"warn";if(token.includes("타점")||token.includes("득점"))return"plus";return"";}
    function renderTokenChips(rowId){const area=document.getElementById(`token_area_${rowId}`);if(!area)return;const tokens=getTokensFromInput(`b_record_${rowId}`);if(tokens.length===0){area.innerHTML=`<span class="empty-text">버튼을 누르면 여기에 기록이 추가됩니다.</span>`;return;}area.innerHTML=tokens.map((t,i)=>`<span class="token-chip ${tokenClass(t)}">${t}<button type="button" class="token-x" onclick="removeBatterToken(${rowId},${i})">×</button></span>`).join("");}
    function calculateBatterStats(text){const raw=String(text||"").trim();if(!raw)return{ab:0,h:0,double:0,triple:0,hr:0,rbi:0,r:0,so:0};const count=(re)=>(raw.match(re)||[]).length;const hr=count(/홈런/g),triple=count(/3루타/g),double=count(/2루타/g),single=count(/(?:^|[\s(])안타(?:[\s)]|$)/g);const h=single+double+triple+hr,so=count(/삼진/g),outKeywords=count(/뜬공|땅볼|병살타|직선타|파울플라이|희생플라이/g),ab=h+so+outKeywords;const rbi=[...raw.matchAll(/(\d+)타점/g)].reduce((s,m)=>s+Number(m[1]),0),r=[...raw.matchAll(/(\d+)득점/g)].reduce((s,m)=>s+Number(m[1]),0);return{ab,h,double,triple,hr,rbi,r,so};}
    function updateBatterStats(id){const s=calculateBatterStats(document.getElementById(`b_record_${id}`).value);document.getElementById(`b_summary_${id}`).innerHTML=`<strong>자동 계산</strong><div class="stat-grid"><div class="stat-pill">타수<b>${s.ab}</b></div><div class="stat-pill">안타<b>${s.h}</b></div><div class="stat-pill">장타<b>2B ${s.double} · 3B ${s.triple} · HR ${s.hr}</b></div><div class="stat-pill">타점/득점<b>${s.rbi} / ${s.r}</b></div><div class="stat-pill">삼진<b>${s.so}</b></div></div>`;renderTokenChips(id);}

    function inningsToOuts(v){const str=String(v||"").trim();if(!str)return 0;if(!str.includes("."))return(Number(str)||0)*3;const[w,p]=str.split(".");return(Number(w)||0)*3+(Number(p)||0);}
    function outsToInning(outs){const full=Math.floor(outs/3),part=outs%3;return `${full}.${part}`;}
    function calculateEra(inn,erVal){const outs=inningsToOuts(inn),er=Number(erVal||0);if(!outs)return"0.00";return((er*9)/(outs/3)).toFixed(2);}
    function updatePitcherEra(id){const era=calculateEra(document.getElementById(`p_inning_${id}`).value,document.getElementById(`p_er_${id}`).value);document.getElementById(`p_era_${id}`).textContent=era;renderPitcherSummary(id);}
    function renderPitcherSummary(id){const get=(f)=>document.getElementById(`p_${f}_${id}`).value||"0";const decision=document.getElementById(`p_decision_${id}`).value||"-";document.getElementById(`p_summary_${id}`).innerHTML=`<strong>요약</strong><div class="stat-grid"><div class="stat-pill">결과<b>${decision}</b></div><div class="stat-pill">이닝<b>${get("inning")||"0"}</b></div><div class="stat-pill">실점/자책<b>${get("runs")} / ${get("er")}</b></div><div class="stat-pill">삼진<b>${get("so")}</b></div><div class="stat-pill">피안타/피홈런<b>${get("hits")} / ${get("hr")}</b></div><div class="stat-pill">사사구<b>${get("bb")}</b></div><div class="stat-pill">ERA<b>${document.getElementById(`p_era_${id}`).textContent}</b></div></div>`;}

    window.addBatterToken=function(id,token){const inputId=`b_record_${id}`,tokens=getTokensFromInput(inputId);tokens.push(token);setTokensToInput(inputId,tokens);updateBatterStats(id);};
    window.removeBatterToken=function(id,index){const inputId=`b_record_${id}`,tokens=getTokensFromInput(inputId);tokens.splice(index,1);setTokensToInput(inputId,tokens);updateBatterStats(id);};
    window.clearBatterRecord=function(id){setTokensToInput(`b_record_${id}`,[]);updateBatterStats(id);};
    window.addPitcherOut=function(id,outCount){const input=document.getElementById(`p_inning_${id}`);input.value=outsToInning(inningsToOuts(input.value)+outCount);updatePitcherEra(id);};
    window.plusPitcherStat=function(id,field,amount=1){const input=document.getElementById(`p_${field}_${id}`);input.value=Number(input.value||0)+amount;if(field==="er"||field==="runs"||field==="hits"||field==="hr"||field==="so"||field==="bb")renderPitcherSummary(id);if(field==="er")updatePitcherEra(id);};
    window.setPitcherDecision=function(id,value){document.getElementById(`p_decision_${id}`).value=value;renderPitcherSummary(id);};
    window.clearPitcherRow=function(id){["decision","inning","runs","er","hits","hr","so","bb"].forEach(f=>{document.getElementById(`p_${f}_${id}`).value="";});updatePitcherEra(id);};

    function batterQuickButtons(id){return `<div class="quick-panel"><div class="quick-group"><div class="quick-title">안타</div><div class="quick-row"><button class="quick-btn hit" onclick="addBatterToken(${id},'안타')">1루타</button><button class="quick-btn hit" onclick="addBatterToken(${id},'2루타')">2루타</button><button class="quick-btn hit" onclick="addBatterToken(${id},'3루타')">3루타</button><button class="quick-btn hit" onclick="addBatterToken(${id},'홈런')">홈런</button></div></div><div class="quick-group"><div class="quick-title">출루 / 아웃</div><div class="quick-row"><button class="quick-btn warn" onclick="addBatterToken(${id},'볼넷')">볼넷</button><button class="quick-btn warn" onclick="addBatterToken(${id},'사구')">사구</button><button class="quick-btn out" onclick="addBatterToken(${id},'삼진')">삼진</button><button class="quick-btn out" onclick="addBatterToken(${id},'땅볼')">땅볼</button><button class="quick-btn out" onclick="addBatterToken(${id},'뜬공')">뜬공</button><button class="quick-btn out" onclick="addBatterToken(${id},'병살타')">병살</button><button class="quick-btn warn" onclick="addBatterToken(${id},'희생플라이')">희플</button></div></div><div class="quick-group"><div class="quick-title">추가 기록</div><div class="quick-row"><button class="quick-btn plus" onclick="addBatterToken(${id},'1타점')">+1타점</button><button class="quick-btn plus" onclick="addBatterToken(${id},'1득점')">+1득점</button><button class="quick-btn danger" onclick="clearBatterRecord(${id})">기록 초기화</button></div></div></div>`;}
    function pitcherQuickButtons(id){return `<div class="quick-panel"><div class="quick-group"><div class="quick-title">이닝</div><div class="quick-row pitcher"><button class="quick-btn hit" onclick="addPitcherOut(${id},1)">+1아웃</button><button class="quick-btn hit" onclick="addPitcherOut(${id},3)">+1이닝</button></div></div><div class="quick-group"><div class="quick-title">투구 기록</div><div class="quick-row pitcher"><button class="quick-btn plus" onclick="plusPitcherStat(${id},'so')">+삼진</button><button class="quick-btn warn" onclick="plusPitcherStat(${id},'runs')">+실점</button><button class="quick-btn warn" onclick="plusPitcherStat(${id},'er')">+자책</button><button class="quick-btn hit" onclick="plusPitcherStat(${id},'hits')">+피안타</button><button class="quick-btn hit" onclick="plusPitcherStat(${id},'hr')">+피홈런</button><button class="quick-btn hit" onclick="plusPitcherStat(${id},'bb')">+사사구</button></div></div><div class="quick-group"><div class="quick-title">결과</div><div class="quick-row pitcher"><button class="quick-btn plus" onclick="setPitcherDecision(${id},'승')">승</button><button class="quick-btn out" onclick="setPitcherDecision(${id},'패')">패</button><button class="quick-btn" onclick="setPitcherDecision(${id},'홀드')">홀드</button><button class="quick-btn" onclick="setPitcherDecision(${id},'세이브')">세이브</button><button class="quick-btn danger" onclick="clearPitcherRow(${id})">초기화</button></div></div></div>`;}

    function refreshDeleteButtons(){const batterCount=battersBody.querySelectorAll("tr").length;battersBody.querySelectorAll(".batter-delete-btn").forEach(btn=>{btn.disabled=batterCount<=1;});const pitcherCount=pitchersBody.querySelectorAll("tr").length;pitchersBody.querySelectorAll(".pitcher-delete-btn").forEach(btn=>{btn.disabled=pitcherCount<=1;});}
    function createBatterRow(data={}){batterRowCounter++;const id=batterRowCounter,row=document.createElement("tr");if(data.isSub)row.classList.add("sub-row");row.dataset.rowId=id;row.innerHTML=`<td><input id="b_order_${id}" class="cell-input" value="${data.order??""}"></td><td><input id="b_name_${id}" class="cell-input" value="${data.name??""}"></td><td><input id="b_pos_${id}" class="cell-input" value="${data.position??""}"></td><td><div class="record-editor"><input id="b_record_${id}" class="cell-input record-input" value="${data.record??""}" placeholder="직접 입력도 가능"><div id="token_area_${id}" class="token-area"></div>${batterQuickButtons(id)}</div></td><td><div class="stat-summary" id="b_summary_${id}"></div></td><td><button type="button" class="sheet-btn small sub" onclick="window.addSubRow(${id})">교체</button><button type="button" class="sheet-btn small delete batter-delete-btn" onclick="window.removeBatterRow(${id})">삭제</button><span class="delete-hint">1명만 남으면 삭제 불가</span></td>`;row.querySelector(`#b_record_${id}`).addEventListener("input",()=>updateBatterStats(id));setTimeout(()=>{updateBatterStats(id);refreshDeleteButtons();},0);return row;}
    function createPitcherRow(data={}){pitcherRowCounter++;const id=pitcherRowCounter,row=document.createElement("tr");row.dataset.pitcherRowId=id;row.innerHTML=`<td><input id="p_name_${id}" class="cell-input" value="${data.name??""}" placeholder="투수명"></td><td><div class="pitcher-card">${pitcherQuickButtons(id)}<div class="pitcher-fields"><label>결과<input id="p_decision_${id}" class="cell-input" value="${data.decision??""}"></label><label>이닝<input id="p_inning_${id}" class="cell-input" value="${data.inning??""}"></label><label>실점<input id="p_runs_${id}" class="cell-input" value="${data.runs??""}"></label><label>자책<input id="p_er_${id}" class="cell-input" value="${data.er??""}"></label><label>피안타<input id="p_hits_${id}" class="cell-input" value="${data.hits??""}"></label><label>피홈런<input id="p_hr_${id}" class="cell-input" value="${data.hr??""}"></label><label>탈삼진<input id="p_so_${id}" class="cell-input" value="${data.so??""}"></label><label>사사구<input id="p_bb_${id}" class="cell-input" value="${data.bb??""}"></label></div></div></td><td><div class="pitcher-summary" id="p_summary_${id}"></div><div style="display:none" id="p_era_${id}">0.00</div></td><td><button type="button" class="sheet-btn small delete pitcher-delete-btn" onclick="window.removePitcherRow(${id})">삭제</button><span class="delete-hint">1명만 남으면 삭제 불가</span></td>`;["decision","inning","runs","er","hits","hr","so","bb"].forEach(f=>row.querySelector(`#p_${f}_${id}`).addEventListener("input",()=>updatePitcherEra(id)));setTimeout(()=>{updatePitcherEra(id);refreshDeleteButtons();},0);return row;}

    function createBattersRows(){battersBody.innerHTML="";batterRowCounter=0;for(let i=1;i<=9;i++)battersBody.appendChild(createBatterRow({order:i}));refreshDeleteButtons();}
    function createPitchersRows(){pitchersBody.innerHTML="";pitcherRowCounter=0;pitchersBody.appendChild(createPitcherRow());refreshDeleteButtons();}
    function getInningRow(prefix){const arr=[];for(let i=1;i<=inningCount;i++)arr.push(document.getElementById(`${prefix}${i}`).value.trim());return arr;}
    function getBatters(){return[...battersBody.querySelectorAll("tr")].map(row=>{const id=row.dataset.rowId,record=document.getElementById(`b_record_${id}`).value.trim(),s=calculateBatterStats(record);return{order:document.getElementById(`b_order_${id}`).value.trim(),name:document.getElementById(`b_name_${id}`).value.trim(),position:document.getElementById(`b_pos_${id}`).value.trim(),record,isSub:row.classList.contains("sub-row"),stats:{ab:s.ab,h:s.h,double:s.double,triple:s.triple,hr:s.hr,rbi:s.rbi,r:s.r,so:s.so}}}).filter(x=>x.name||x.position||x.record);}
    function getPitchers(){return[...pitchersBody.querySelectorAll("tr")].map(row=>{const id=row.dataset.pitcherRowId;return{name:document.getElementById(`p_name_${id}`).value.trim(),decision:document.getElementById(`p_decision_${id}`).value.trim(),inning:document.getElementById(`p_inning_${id}`).value.trim(),runs:document.getElementById(`p_runs_${id}`).value.trim(),er:document.getElementById(`p_er_${id}`).value.trim(),hits:document.getElementById(`p_hits_${id}`).value.trim(),hr:document.getElementById(`p_hr_${id}`).value.trim(),so:document.getElementById(`p_so_${id}`).value.trim(),bb:document.getElementById(`p_bb_${id}`).value.trim(),era:document.getElementById(`p_era_${id}`).textContent}}).filter(x=>x.name);}

    function resetForm(){currentEditId=null;gameTypeInput.value="연습경기";gameDateInput.value=getDefaultDate();gameTimeInput.value="";opponentInput.value="";homeAwayInput.value="";finalScoreInput.value="";gameResultInput.value="";inningCount=9;renderInningTable();createBattersRows();createPitchersRows();saveBtn.textContent="저장";loadLineupToSheet();}
    function buildRecordSummary(data){return `${data.gameType||"연습경기"} / ${data.homeAway||"-"} / ${data.finalScore||"-"} / ${data.gameResult||"-"}`;}
    async function loadLineupToSheet(){const dateStr=gameDateInput.value,type=gameTypeInput.value;if(!dateStr||currentEditId)return;const snap=await getDoc(doc(db,"lineups",getLineupId(type,dateStr)));if(!snap.exists()){lineupNotice.textContent="해당 경기 종류/날짜로 저장된 라인업이 없습니다.";return;}const lineup=snap.data();if(!lineup?.players)return;createBattersRows();lineup.players.forEach((p,idx)=>{const row=battersBody.querySelectorAll("tr")[idx];if(!row)return;const id=row.dataset.rowId;document.getElementById(`b_order_${id}`).value=p.order||idx+1;document.getElementById(`b_name_${id}`).value=p.name||"";document.getElementById(`b_pos_${id}`).value=p.position||"";});createPitchersRows();if(lineup.pitcher){const first=pitchersBody.querySelector("tr");const id=first.dataset.pitcherRowId;document.getElementById(`p_name_${id}`).value=lineup.pitcher;}if(lineup.opponent&&!opponentInput.value)opponentInput.value=lineup.opponent;lineupNotice.textContent=`라인업 불러오기 완료: ${type} / ${dateStr}`;}
    async function syncRecordSummary(id,data){await setDoc(doc(db,"records",id),{gameType:data.gameType||"연습경기",date:data.gameDate,opponent:data.opponent,result:data.gameResult==="승리"?"승":data.gameResult==="패배"?"패":"무",score:data.finalScore,memo:buildRecordSummary(data),updatedAt:Date.now(),createdAt:data.createdAt});}
    async function saveSheet(){const now=Date.now(),header=Array.from({length:inningCount},(_,i)=>String(i+1));const data={gameType:gameTypeInput.value,gameDate:gameDateInput.value.trim(),gameTime:gameTimeInput.value.trim(),opponent:opponentInput.value.trim(),homeAway:homeAwayInput.value,finalScore:finalScoreInput.value.trim(),gameResult:gameResultInput.value,innings:{header,away:getInningRow("away"),home:getInningRow("home")},batters:getBatters(),pitchers:getPitchers(),createdBy:currentUserData?.nickname||"",updatedAt:now};if(!data.gameDate||!data.opponent||!data.finalScore||!data.gameResult){alert("경기 날짜, 상대팀, 최종 스코어, 결과는 꼭 입력해주세요.");return;}saveBtn.disabled=true;saveBtn.textContent=currentEditId?"수정 중...":"저장 중...";try{if(currentEditId){await updateDoc(doc(db,"scoresheets",currentEditId),data);await syncRecordSummary(currentEditId,{...data,createdAt:now});alert("기록지 수정 완료!");}else{const added=await addDoc(collection(db,"scoresheets"),{...data,createdAt:now});await syncRecordSummary(added.id,{...data,createdAt:now});alert("기록지 저장 완료!");}resetForm();}catch(e){console.error(e);alert("기록지 저장 중 오류가 발생했습니다.");}finally{saveBtn.disabled=false;saveBtn.textContent="저장";}}

    function renderSheets(){sheetList.innerHTML="";if(sheets.length===0){sheetList.innerHTML=`<p class="empty-text">아직 저장된 기록지가 없습니다.</p>`;return;}sheets.forEach(sheet=>{const box=document.createElement("div");box.className="sheet-box";box.innerHTML=`<div class="sheet-top"><span class="game-type-badge">${sheet.gameType||"연습경기"}</span>${sheet.gameDate||"-"} ${sheet.gameTime||""} vs ${sheet.opponent||"-"} (${sheet.homeAway||"-"}) ${sheet.finalScore||"-"} ${sheet.gameResult||"-"}</div><button class="sheet-btn" onclick="window.editSheet('${sheet.id}')">수정</button><button class="sheet-btn delete" onclick="window.deleteSheet('${sheet.id}')">삭제</button>`;sheetList.appendChild(box);});}
    function fillForm(sheet){gameTypeInput.value=sheet.gameType||"연습경기";gameDateInput.value=sheet.gameDate||"";gameTimeInput.value=sheet.gameTime||"";opponentInput.value=sheet.opponent||"";homeAwayInput.value=sheet.homeAway||"";finalScoreInput.value=sheet.finalScore||"";gameResultInput.value=sheet.gameResult||"";const away=sheet.innings?.away||[],home=sheet.innings?.home||[],header=sheet.innings?.header||["1","2","3","4","5","6","7","8","9"];inningCount=header.length;renderInningTable(away,home);battersBody.innerHTML="";batterRowCounter=0;(sheet.batters||[]).forEach(b=>battersBody.appendChild(createBatterRow({order:b.order||"",name:b.name||"",position:b.position||"",record:b.record||"",isSub:!!b.isSub})));pitchersBody.innerHTML="";pitcherRowCounter=0;if(sheet.pitchers?.length){sheet.pitchers.forEach(p=>pitchersBody.appendChild(createPitcherRow(p)));}else createPitchersRows();refreshDeleteButtons();}

    window.editSheet=function(id){const t=sheets.find(s=>s.id===id);if(!t)return;currentEditId=id;fillForm(t);saveBtn.textContent="수정 저장";window.scrollTo({top:0,behavior:"smooth"});};
    window.deleteSheet=async function(id){if(!confirm("이 기록지를 삭제할까요?"))return;await deleteDoc(doc(db,"scoresheets",id));await deleteDoc(doc(db,"records",id));alert("기록지 삭제 완료!");if(currentEditId===id)resetForm();};
    window.addSubRow=function(id){const base=battersBody.querySelector(`tr[data-row-id="${id}"]`);if(!base)return;const order=document.getElementById(`b_order_${id}`).value.trim();base.insertAdjacentElement("afterend",createBatterRow({order,isSub:true}));refreshDeleteButtons();};
    window.removeBatterRow=function(id){if(battersBody.querySelectorAll("tr").length<=1){alert("타자는 최소 1명은 남아 있어야 합니다.");return;}const row=battersBody.querySelector(`tr[data-row-id="${id}"]`);if(row)row.remove();refreshDeleteButtons();};
    window.removePitcherRow=function(id){if(pitchersBody.querySelectorAll("tr").length<=1){alert("투수는 최소 1명은 남아 있어야 합니다.");return;}const row=pitchersBody.querySelector(`tr[data-pitcher-row-id="${id}"]`);if(row)row.remove();refreshDeleteButtons();};

    addInningBtn.addEventListener("click",()=>{const away=getInningRow("away"),home=getInningRow("home");inningCount++;renderInningTable(away,home);});
    removeInningBtn.addEventListener("click",()=>{if(inningCount<=9)return;const away=getInningRow("away").slice(0,-1),home=getInningRow("home").slice(0,-1);inningCount--;renderInningTable(away,home);});
    addPitcherBtn.addEventListener("click",()=>{pitchersBody.appendChild(createPitcherRow());refreshDeleteButtons();});saveBtn.addEventListener("click",saveSheet);resetBtn.addEventListener("click",resetForm);gameDateInput.addEventListener("change",loadLineupToSheet);gameTypeInput.addEventListener("change",loadLineupToSheet);
    function init(){resetForm();const sheetQuery=query(collection(db,"scoresheets"),orderBy("createdAt","desc"));onSnapshot(sheetQuery,snap=>{sheets=[];snap.forEach(d=>sheets.push({id:d.id,...d.data()}));renderSheets();},e=>{console.error(e);sheetList.innerHTML=`<p class="empty-text">기록지를 불러오지 못했습니다.</p>`;});}
  </script>
</body>
</html>
