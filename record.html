<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>기록실</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .record-wrap{width:95%;max-width:1200px;margin:34px auto}
    .record-card{background:#fff;border-radius:22px;padding:24px;box-shadow:0 10px 24px rgba(0,0,0,.06);margin-bottom:22px}
    .card-title{font-size:34px;font-weight:900;margin-bottom:12px}
    .record-note,.empty-text{color:#666;font-size:15px;line-height:1.6}
    .menu-clean{display:flex;flex-wrap:wrap;gap:12px;padding:16px 0 0}
    .menu-clean a{text-decoration:none;padding:10px 14px;border-radius:14px;background:#fff;border:1px solid #d6d6d6;font-size:18px;color:#111}
    .filter-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;align-items:end;margin-top:14px}
    label{font-weight:900;display:block;margin-bottom:7px}
    .record-input,.record-select{width:100%;padding:12px 14px;border-radius:14px;border:1px solid #d6dce5;box-sizing:border-box;font-size:15px;background:#fff;font-family:inherit}
    .record-btn{border:none;border-radius:12px;background:#666;color:#fff;font-weight:900;padding:12px 16px;cursor:pointer}
    .record-btn.primary{background:#1b65ba}.record-btn.danger{background:#b00020}
    .record-tabs{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0 18px}
    .tab-btn{border:none;border-radius:999px;padding:10px 15px;background:#eef1f5;color:#222;font-weight:900;cursor:pointer}
    .tab-btn.active{background:#1b65ba;color:#fff}
    .day-title{font-size:24px;font-weight:900;margin:20px 0 12px;color:#1b65ba;background:#eef3ff;border-radius:14px;padding:12px 16px}
    .sheet-box{background:#fbfcff;border:1px solid #e4eaf2;border-radius:18px;padding:18px;margin-bottom:14px}
    .sheet-top{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:flex-start;font-size:20px;font-weight:900;line-height:1.5}
    .badge{display:inline-block;border-radius:999px;padding:5px 10px;background:#e8f1ff;color:#1b65ba;font-size:12px;font-weight:900;margin-right:6px}
    .badge.league{background:#fff3e8;color:#c26b00}
    .sheet-info{margin-top:8px;color:#444;line-height:1.7}
    .sheet-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
    .ranking-table-wrap{overflow-x:auto;margin-top:14px}
    .ranking-table{width:100%;border-collapse:separate;border-spacing:0;min-width:900px;border:1px solid #e1e6ee;border-radius:16px;overflow:hidden}
    .ranking-table th,.ranking-table td{border-right:1px solid #e1e6ee;border-bottom:1px solid #e1e6ee;padding:11px 12px;text-align:center;white-space:nowrap}
    .ranking-table th{background:#f6f8fb;font-weight:900}
    .ranking-table tr:last-child td{border-bottom:none}.ranking-table th:last-child,.ranking-table td:last-child{border-right:none}
    .rank-num{font-weight:900;color:#1b65ba}.name-cell{text-align:left!important;font-weight:900}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top-title"><h1>레이 마린스</h1><a class="top-link" href="index.html">메인으로</a></div>
    <div class="menu-clean">
      <a href="lineup.html">라인업</a><a href="record.html">기록실</a><a href="scoresheet.html">기록지</a><a href="mypage.html">마이페이지</a>
    </div>
  </div>

  <div class="record-wrap">
    <div class="record-card">
      <div class="card-title">기록실</div>
      <p class="record-note">저장된 기록지를 날짜별로 확인하고, 전체 타자 타율 순위를 볼 수 있습니다.</p>
      <div class="record-tabs">
        <button id="allTypeBtn" class="tab-btn active" type="button">전체 기록</button>
        <button id="practiceTypeBtn" class="tab-btn" type="button">연습경기 기록</button>
        <button id="leagueTypeBtn" class="tab-btn" type="button">리그경기 기록</button>
      </div>
      <div class="filter-grid">
        <div><label for="dateSearch">날짜 검색</label><input id="dateSearch" class="record-input" type="date"></div>
        <div><button id="clearDateBtn" class="record-btn">전체 보기</button></div>
      </div>
      <p id="recordCount" class="record-note">기록을 불러오는 중...</p>
    </div>

    <div class="record-card">
      <div class="card-title">전체 타자 타율 순위</div>
      <p class="record-note">활동 선수만 표시됩니다. <strong>선수 제외</strong> 또는 <strong>용병 지정</strong>된 유저는 순위에서 빠집니다.</p>
      <div class="filter-grid">
        <div>
          <label for="rankSort">정렬</label>
          <select id="rankSort" class="record-select">
            <option value="avg">타율 순위별</option>
            <option value="number">등번호순</option>
            <option value="name">닉네임순</option>
          </select>
        </div>
      </div>
      <div class="ranking-table-wrap">
        <table class="ranking-table">
          <thead>
            <tr><th>순위</th><th>등번호</th><th>선수명</th><th>타율</th><th>OPS</th><th>경기</th><th>타수</th><th>안타</th><th>2루타</th><th>3루타</th><th>홈런</th><th>타점</th><th>득점</th><th>도루</th><th>볼넷</th><th>고의사구</th><th>삼진</th></tr>
          </thead>
          <tbody id="batterRankingBody"><tr><td colspan="17">불러오는 중...</td></tr></tbody>
        </table>
      </div>
    </div>

    <div class="record-card">
      <div class="card-title">저장된 기록지</div>
      <div id="sheetList"><p class="empty-text">기록지를 불러오는 중...</p></div>
    </div>
  </div>

<script type="module">
import { db } from './firebase-config.js';
import { checkLogin, isStaff } from './auth.js';
import { collection, getDocs, onSnapshot, query, orderBy, deleteDoc, doc } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js';

const $=id=>document.getElementById(id);
const allTypeBtn=$('allTypeBtn'), practiceTypeBtn=$('practiceTypeBtn'), leagueTypeBtn=$('leagueTypeBtn');
const dateSearch=$('dateSearch'), clearDateBtn=$('clearDateBtn'), recordCount=$('recordCount'), sheetList=$('sheetList'), rankSort=$('rankSort'), batterRankingBody=$('batterRankingBody');

let currentType='전체', canEdit=false, sheets=[], users=[];

function num(v){return Number(v)||0}
function fmt3(v){return isFinite(v)?v.toFixed(3):'0.000'}
function getTypeMatch(s){return currentType==='전체' || (s.gameType||'연습경기')===currentType}
function getDateMatch(s){return !dateSearch.value || s.gameDate===dateSearch.value}
function getFilteredSheets(){return sheets.filter(s=>getTypeMatch(s)&&getDateMatch(s))}
function setType(type){currentType=type;allTypeBtn.classList.toggle('active',type==='전체');practiceTypeBtn.classList.toggle('active',type==='연습경기');leagueTypeBtn.classList.toggle('active',type==='리그경기');renderSheets();renderBatterRanking()}
function gameTypeBadge(type){const isLeague=type==='리그경기';return `<span class="badge ${isLeague?'league':''}">${type||'연습경기'}</span>`}
function timeValue(t){const m=String(t||'').match(/\d+/);return m?Number(m[0]):999}
function groupByDate(data){const g={};data.forEach(s=>{const d=s.gameDate||'날짜 없음';(g[d] ||= []).push(s)});Object.keys(g).forEach(d=>g[d].sort((a,b)=>timeValue(a.gameTime)-timeValue(b.gameTime)));return g}

function renderSheets(){
  const filtered=getFilteredSheets();
  recordCount.textContent=`표시 기록 ${filtered.length}개 / 전체 기록 ${sheets.length}개`;
  if(!filtered.length){sheetList.innerHTML='<p class="empty-text">조건에 맞는 기록지가 없습니다.</p>';return}
  const grouped=groupByDate(filtered), dates=Object.keys(grouped).sort((a,b)=>b.localeCompare(a));
  sheetList.innerHTML='';
  dates.forEach(date=>{
    const day=document.createElement('div');day.innerHTML=`<div class="day-title">${date}</div>`;sheetList.appendChild(day);
    grouped[date].forEach(sheet=>{
      const box=document.createElement('div');box.className='sheet-box';
      box.innerHTML=`<div class="sheet-top"><div>${gameTypeBadge(sheet.gameType)}${sheet.gameTime||'-'} vs ${sheet.opponent||'-'}</div><div>${sheet.finalScore||'-'} ${sheet.gameResult||''}</div></div>
      <div class="sheet-info">홈/원정: <strong>${sheet.homeAway||'-'}</strong><br>타자 기록 ${(sheet.batters||[]).length}명 · 투수 기록 ${(sheet.pitchers||[]).length}명</div>
      ${canEdit?`<div class="sheet-actions"><button class="record-btn primary" data-edit="${sheet.id}">수정</button><button class="record-btn danger" data-delete="${sheet.id}">삭제</button></div>`:''}`;
      const editBtn=box.querySelector('[data-edit]'), deleteBtn=box.querySelector('[data-delete]');
      if(editBtn) editBtn.onclick=()=>location.href=`scoresheet.html?edit=${sheet.id}`;
      if(deleteBtn) deleteBtn.onclick=async()=>{if(!confirm('이 기록지를 삭제할까요?'))return;await deleteDoc(doc(db,'scoresheets',sheet.id));try{await deleteDoc(doc(db,'records',sheet.id))}catch(e){}};
      sheetList.appendChild(box);
    });
  });
}

function emptyBatterRow(u){return {nickname:u.nickname||'',number:u.number||'',gamesSet:new Set(),ab:0,h:0,double:0,triple:0,hr:0,rbi:0,r:0,so:0,sb:0,bb:0,ibb:0,hbp:0}}
function getBatterStats(){
  const map={};
  users.forEach(u=>{if(u.nickname) map[u.nickname]=emptyBatterRow(u)});
  getFilteredSheets().forEach(sheet=>{
    const gameKey=sheet.id||`${sheet.gameType}_${sheet.gameDate}_${sheet.gameTime}_${sheet.opponent}`;
    (sheet.batters||[]).forEach(b=>{
      const name=b.name||'';
      if(!map[name]) return; // 용병/비회원/제외 선수는 순위 제외
      const s=b.stats||{};
      map[name].gamesSet.add(gameKey);
      map[name].ab+=num(s.ab); map[name].h+=num(s.h); map[name].double+=num(s.double); map[name].triple+=num(s.triple); map[name].hr+=num(s.hr);
      map[name].rbi+=num(s.rbi); map[name].r+=num(s.r); map[name].so+=num(s.so); map[name].sb+=num(s.sb); map[name].bb+=num(s.bb); map[name].ibb+=num(s.ibb); map[name].hbp+=num(s.hbp);
    });
  });
  return Object.values(map).map(p=>{
    const singles=Math.max(p.h-p.double-p.triple-p.hr,0), tb=singles+p.double*2+p.triple*3+p.hr*4;
    const avg=p.ab>0?p.h/p.ab:0, obpDen=p.ab+p.bb+p.ibb+p.hbp, obp=obpDen>0?(p.h+p.bb+p.ibb+p.hbp)/obpDen:0, slg=p.ab>0?tb/p.ab:0;
    return {...p,games:p.gamesSet.size,avg,obp,slg,ops:obp+slg};
  });
}
function numberSortValue(v){const n=Number(String(v||'').replace(/[^0-9]/g,''));return Number.isFinite(n)&&n>0?n:9999}
function renderBatterRanking(){
  let data=getBatterStats();
  if(rankSort.value==='number') data.sort((a,b)=>numberSortValue(a.number)-numberSortValue(b.number)||a.nickname.localeCompare(b.nickname));
  else if(rankSort.value==='name') data.sort((a,b)=>a.nickname.localeCompare(b.nickname));
  else data.sort((a,b)=>b.avg-a.avg||b.ops-a.ops||b.h-a.h||a.nickname.localeCompare(b.nickname));
  if(!data.length){batterRankingBody.innerHTML='<tr><td colspan="17">표시할 선수가 없습니다.</td></tr>';return}
  batterRankingBody.innerHTML=data.map((p,i)=>`<tr><td class="rank-num">${i+1}</td><td>${p.number||'-'}</td><td class="name-cell">${p.nickname}</td><td><strong>${fmt3(p.avg)}</strong></td><td>${fmt3(p.ops)}</td><td>${p.games}</td><td>${p.ab}</td><td>${p.h}</td><td>${p.double}</td><td>${p.triple}</td><td>${p.hr}</td><td>${p.rbi}</td><td>${p.r}</td><td>${p.sb}</td><td>${p.bb}</td><td>${p.ibb}</td><td>${p.so}</td></tr>`).join('');
}
async function loadUsers(){
  const snap=await getDocs(collection(db,'users'));
  users=[];
  snap.forEach(d=>{
    const u=d.data();
    if(u.approved && u.nickname && u.active !== false && !u.mercenary) users.push(u);
  });
}

checkLogin(async (user,userData)=>{
  canEdit=isStaff(userData);
  await loadUsers();
  onSnapshot(query(collection(db,'scoresheets'),orderBy('createdAt','desc')),snap=>{
    sheets=[];snap.forEach(d=>sheets.push({id:d.id,...d.data()}));
    renderSheets();renderBatterRanking();
  },e=>{console.error(e);sheetList.innerHTML='<p class="empty-text">기록지를 불러오지 못했습니다.</p>';batterRankingBody.innerHTML='<tr><td colspan="17">타자 기록을 불러오지 못했습니다.</td></tr>'});
});
allTypeBtn.onclick=()=>setType('전체');practiceTypeBtn.onclick=()=>setType('연습경기');leagueTypeBtn.onclick=()=>setType('리그경기');
dateSearch.onchange=()=>{renderSheets();renderBatterRanking()};clearDateBtn.onclick=()=>{dateSearch.value='';renderSheets();renderBatterRanking()};rankSort.onchange=renderBatterRanking;
</script>
</body>
</html>
