<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>기록실</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .record-wrap { width: min(1100px, calc(100% - 28px)); margin: 34px auto; }
    .record-card { background: white; border-radius: 22px; padding: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); margin-bottom: 22px; }
    .card-title { font-size: 34px; font-weight: 900; margin-bottom: 14px; }
    .record-note, .empty-text { color:#666; font-size:15px; line-height:1.6; }
    .top-actions { display:flex; flex-wrap:wrap; gap:10px; margin-top:12px; }
    .top-actions a { text-decoration:none; color:#1b65ba; font-weight:800; }
    .record-tabs { display:flex; gap:10px; margin: 14px 0 18px; }
    .tab-btn { padding:10px 16px; border:none; border-radius:999px; background:#e9ecef; color:#222; font-size:14px; font-weight:800; cursor:pointer; }
    .tab-btn.active { background:#1b65ba; color:white; }
    .record-box { background:#f8f8f8; border-radius:18px; padding:18px; margin-bottom:16px; border-left:6px solid #1b65ba; }
    .record-box.league { border-left-color:#c26b00; }
    .record-top { display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:10px; }
    .record-title { font-size:20px; font-weight:900; }
    .record-result { padding:6px 12px; border-radius:999px; font-size:14px; font-weight:800; color:white; }
    .record-result.win { background:#0a7a2f; }
    .record-result.lose { background:#b00020; }
    .record-result.draw { background:#666; }
    .game-type-badge { display:inline-block; padding:5px 10px; border-radius:999px; font-size:13px; font-weight:800; margin-right:6px; background:#e8f1ff; color:#1b65ba; }
    .game-type-badge.league { background:#fff3e8; color:#c26b00; }
    .record-line { margin:7px 0; line-height:1.6; }
    .mini-section { margin-top:14px; padding-top:12px; border-top:1px solid #e5e9f0; }
    .mini-title { font-weight:900; margin-bottom:8px; }
    .player-chip { display:inline-block; background:white; border:1px solid #e1e6ee; border-radius:12px; padding:7px 10px; margin:4px 4px 4px 0; font-size:13px; }
    .hidden { display:none!important; }
  </style>
</head>
<body>
  <div class="record-wrap">
    <div class="record-card">
      <div class="card-title">기록실</div>
      <p class="record-note">저장된 경기 기록지를 확인할 수 있습니다.</p>
      <div class="top-actions">
        <a href="index.html">메인으로</a>
        <a id="sheetLink" class="hidden" href="scoresheet.html">기록지 작성</a>
      </div>
    </div>

    <div class="record-card">
      <div class="card-title">경기 기록</div>
      <div class="record-tabs">
        <button id="practiceTab" class="tab-btn active" type="button">연습경기</button>
        <button id="leagueTab" class="tab-btn" type="button">리그경기</button>
      </div>
      <div id="recordList"><p class="empty-text">기록을 불러오는 중...</p></div>
    </div>
  </div>

  <script type="module">
    import { db } from "./firebase-config.js";
    import { checkLogin, isStaff } from "./auth.js";
    import { collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const recordList = document.getElementById("recordList");
    const sheetLink = document.getElementById("sheetLink");
    const practiceTab = document.getElementById("practiceTab");
    const leagueTab = document.getElementById("leagueTab");

    let currentType = "연습경기";
    let allSheets = [];

    checkLogin((user, userData) => {
      if (isStaff(userData)) sheetLink.classList.remove("hidden");
      startScoresheetListener();
    });

    function getResultClass(result) {
      if (result === "승" || result === "승리") return "win";
      if (result === "패" || result === "패배") return "lose";
      return "draw";
    }

    function normalizeResult(result) {
      if (result === "승리") return "승";
      if (result === "패배") return "패";
      if (result === "무승부") return "무";
      return result || "-";
    }

    function sortSheets(list) {
      return [...list].sort((a, b) => {
        const aKey = a.createdAt || a.updatedAt || new Date(a.gameDate || a.date || 0).getTime();
        const bKey = b.createdAt || b.updatedAt || new Date(b.gameDate || b.date || 0).getTime();
        return bKey - aKey;
      });
    }

    function renderRecords() {
      recordList.innerHTML = "";
      const filtered = sortSheets(allSheets).filter(sheet => (sheet.gameType || "연습경기") === currentType);

      if (filtered.length === 0) {
        recordList.innerHTML = `<p class="empty-text">${currentType} 기록이 없습니다.</p>`;
        return;
      }

      filtered.forEach((sheet) => {
        const gameType = sheet.gameType || "연습경기";
        const isLeague = gameType === "리그경기";
        const result = normalizeResult(sheet.gameResult || sheet.result);
        const resultClass = getResultClass(result);
        const batters = sheet.batters || [];
        const pitchers = sheet.pitchers || [];

        const batterHtml = batters.length
          ? batters.map(b => `<span class="player-chip">${b.order || "-"}. ${b.name || "-"} ${b.position || ""} / ${b.stats?.ab ?? 0}타수 ${b.stats?.h ?? 0}안타</span>`).join("")
          : `<span class="empty-text">타자 기록 없음</span>`;

        const pitcherHtml = pitchers.length
          ? pitchers.map(p => `<span class="player-chip">${p.name || "-"} / ${p.inning || "0"}이닝 ${p.so || 0}K ${p.runs || 0}실점</span>`).join("")
          : `<span class="empty-text">투수 기록 없음</span>`;

        const box = document.createElement("div");
        box.className = `record-box ${isLeague ? "league" : "practice"}`;
        box.innerHTML = `
          <div class="record-top">
            <div class="record-title">${sheet.gameDate || sheet.date || "-"} ${sheet.gameTime || ""}</div>
            <div class="record-result ${resultClass}">${result}</div>
          </div>
          <div class="game-type-badge ${isLeague ? "league" : ""}">${gameType}</div>
          <div class="record-line"><strong>상대팀:</strong> ${sheet.opponent || "-"}</div>
          <div class="record-line"><strong>홈/원정:</strong> ${sheet.homeAway || "-"}</div>
          <div class="record-line"><strong>스코어:</strong> ${sheet.finalScore || sheet.score || "-"}</div>
          <div class="mini-section">
            <div class="mini-title">타자 기록</div>
            ${batterHtml}
          </div>
          <div class="mini-section">
            <div class="mini-title">투수 기록</div>
            ${pitcherHtml}
          </div>
        `;
        recordList.appendChild(box);
      });
    }

    function setActiveTab(type) {
      currentType = type;
      practiceTab.classList.toggle("active", type === "연습경기");
      leagueTab.classList.toggle("active", type === "리그경기");
      renderRecords();
    }

    practiceTab.addEventListener("click", () => setActiveTab("연습경기"));
    leagueTab.addEventListener("click", () => setActiveTab("리그경기"));

    function startScoresheetListener() {
      onSnapshot(collection(db, "scoresheets"), (snapshot) => {
        allSheets = [];
        snapshot.forEach((docu) => {
          allSheets.push({ id: docu.id, ...docu.data() });
        });
        renderRecords();
      }, (error) => {
        console.error(error);
        recordList.innerHTML = `<p class="empty-text">기록을 불러오지 못했습니다. Firebase 규칙 또는 콘솔 오류를 확인해주세요.</p>`;
      });
    }
  </script>
</body>
</html>
