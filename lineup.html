<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>라인업</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .lineup-wrap{width:95%;max-width:1200px;margin:34px auto}
    .lineup-card{background:white;border-radius:22px;padding:24px;box-shadow:0 10px 24px rgba(0,0,0,.06);margin-bottom:22px}
    .card-title{font-size:34px;font-weight:900;margin-bottom:14px}
    .lineup-note,.empty-text{color:#666;font-size:15px;line-height:1.6;margin-bottom:16px}
    .lineup-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:18px}
    .lineup-input,.lineup-select{width:100%;padding:12px 14px;border-radius:14px;border:1px solid #d6dce5;box-sizing:border-box;font-size:15px;background:#fff;font-family:inherit}
    label{font-weight:800;display:block;margin-bottom:7px}
    .lineup-btn{padding:11px 18px;border-radius:12px;border:none;background:#111;color:white;cursor:pointer;margin-right:8px;margin-top:12px;font-size:15px;font-weight:800}
    .lineup-btn.sub{background:#666}.lineup-btn.delete{background:#b00020}.lineup-btn.edit{background:#1b65ba}.lineup-btn.small{padding:8px 12px;font-size:13px;border-radius:10px;margin-top:0}
    .hidden{display:none!important}.lineup-table-wrap{overflow-x:auto;margin-top:16px}
    .lineup-table{width:100%;border-collapse:collapse;background:#fff;min-width:680px}
    .lineup-table th,.lineup-table td{border:1px solid #e1e6ee;padding:10px;text-align:center;vertical-align:top}
    .lineup-table th{background:#f6f8fb;font-weight:900}
    .lineup-table input,.lineup-table select{width:100%;padding:10px;border:1px solid #ccd5e0;border-radius:12px;text-align:center;font-family:inherit;background:white}
    .readonly-lineup{display:grid;gap:10px;margin-top:14px}.readonly-row{display:grid;grid-template-columns:60px 1fr 100px;gap:10px;align-items:center;padding:12px;border:1px solid #e1e6ee;border-radius:14px;background:#fafbfd}
    .readonly-order{font-weight:900;color:#1b65ba;text-align:center}.readonly-name{font-weight:800}.readonly-pos{text-align:center;font-weight:900;background:#eef3ff;color:#1b65ba;border-radius:999px;padding:6px 10px}
    .lineup-box{background:#f8f8f8;border-radius:16px;padding:18px;margin-bottom:16px;border-left:6px solid #1b65ba}
    .lineup-top{font-size:20px;font-weight:900;line-height:1.6;margin-bottom:10px;cursor:pointer}.lineup-detail{margin-top:12px;padding-top:12px;border-top:1px solid #ddd}
    .lineup-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;align-items:center}
    .badge{display:inline-block;padding:5px 10px;border-radius:999px;background:#e8f1ff;color:#1b65ba;font-size:13px;font-weight:900;margin-right:6px}
    .autocomplete-wrap{position:relative;display:flex;flex-direction:column}.autocomplete-list{position:relative;margin-top:6px;width:100%;max-height:190px;overflow-y:auto;background:#fff;border:1px solid #ccd5e0;border-radius:14px;box-shadow:0 8px 18px rgba(0,0,0,.08);z-index:20}
    .autocomplete-item{padding:10px 12px;cursor:pointer;text-align:left;font-size:14px}.autocomplete-item:hover,.autocomplete-item.active{background:#eaf1ff;color:#1b65ba;font-weight:900}
    .autocomplete-empty{padding:10px 12px;color:#666;font-size:14px;background:#f6f8fb}
    @media(max-width:700px){.card-title{font-size:28px}.readonly-row{grid-template-columns:44px 1fr 76px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top-title"><h1>레이 마린스</h1><a class="top-link" href="index.html">메인으로</a></div>
    <div class="menu"><a href="lineup.html">라인업</a><a href="record.html">기록실</a><a href="scoresheet.html">기록지</a><a href="mypage.html">마이페이지</a></div>
  </div>

  <div class="lineup-wrap">
    <div class="lineup-card">
      <div class="card-title">오늘의 라인업</div>
      <p class="lineup-note">오늘 날짜에 저장된 라인업을 확인할 수 있습니다.</p>
      <div id="todayLineupBox"><p class="empty-text">오늘의 라인업을 불러오는 중...</p></div>
    </div>

    <div id="editorCard" class="lineup-card hidden">
      <div class="card-title">라인업 작성 / 수정</div>
      <p class="lineup-note">기록원과 관리진만 라인업을 작성할 수 있습니다. 용병은 선수명 뒤에 -용병을 붙여 입력하세요. 청백전처럼 팀을 나눌 때는 주장/팀명 칸에 예: 0sx_xy0팀처럼 적으면 됩니다.</p>
      <div class="lineup-grid">
        <div><label for="gameType">경기 종류</label><select id="gameType" class="lineup-select"><option value="연습경기">연습경기</option><option value="리그경기">리그경기</option><option value="청백전">청백전</option></select></div>
        <div><label for="gameDate">경기 날짜</label><input id="gameDate" type="date" class="lineup-input"></div>
        <div><label for="gameTime">경기 시간</label><input id="gameTime" class="lineup-input" placeholder="예: 20시"></div>
        <div><label for="opponent">상대팀</label><input id="opponent" class="lineup-input" placeholder="예: 오버드라이브"></div>
        <div>
          <label for="teamSide">홈팀 / 원정팀</label>
          <select id="teamSide" class="cheong-only" class="lineup-select">
            <option value="홈팀">홈팀</option>
            <option value="원정팀">원정팀</option>
          </select>
        </div>
        <div><label for="captainName">주장 / 팀명</label><input id="captainName" class="cheong-only" class="lineup-input" placeholder="예: 0sx_xy0팀"></div>
        <div><label for="startingPitcher">선발 투수</label><div class="autocomplete-wrap"><input id="startingPitcher" class="lineup-input player-autocomplete" placeholder="선발 투수"><div class="autocomplete-list hidden"></div></div></div>
      </div>
      <div class="lineup-table-wrap">
        <table class="lineup-table">
          <thead><tr><th>타순</th><th>선수명</th><th>포지션</th></tr></thead>
          <tbody id="lineupBody"></tbody>
        </table>
      </div>
      <button id="saveBtn" class="lineup-btn">라인업 저장</button>
      <button id="resetBtn" class="lineup-btn sub">초기화</button>
    </div>

    <div id="savedCard" class="lineup-card hidden">
      <div class="card-title">저장된 라인업</div>
      <div id="savedLineups"><p class="empty-text">라인업을 불러오는 중...</p></div>
    </div>
  </div>

  <script type="module">
    import { db } from "./firebase-config.js";
    import { checkLogin, isStaff } from "./auth.js";
    import { collection, getDocs, getDoc, setDoc, deleteDoc, doc, query, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const POSITIONS=["SP","C","1B","2B","SS","3B","RF","CF","LF"];
    const $=id=>document.getElementById(id);
    const editorCard=$("editorCard"),savedCard=$("savedCard"),todayLineupBox=$("todayLineupBox"),savedLineups=$("savedLineups"),lineupBody=$("lineupBody");
    const gameTypeInput=$("gameType"),gameDateInput=$("gameDate"),gameTimeInput=$("gameTime"),opponentInput=$("opponent"),teamSideInput=$("teamSide"),captainNameInput=$("captainName"),startingPitcherInput=$("startingPitcher"),saveBtn=$("saveBtn"),resetBtn=$("resetBtn");
    let approvedNicknames=[],savedData=[],currentEditId=null;

    function today(){const n=new Date();return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,"0")}-${String(n.getDate()).padStart(2,"0")}`}
    function lineupId(gameType,date,time,teamSide='',captainName=''){
      const base=`${gameType}_${date}_${String(time||'').trim()}`;
      if(gameType==='청백전'){
        const side=String(teamSide||'팀').trim();
        const cap=String(captainName||'무명').trim().replace(/\s+/g,'_');
        return `${base}_${side}_${cap}`;
      }
      return base;
    }
    
function normalizeMercenaryName(name){
  const raw = String(name || '').trim();
  if(!raw) return '';
  return raw
    .replace(/\s*-\s*용병\s*$/,'-용병')
    .replace(/\s+용병\s*$/,'-용병');
}

    function positionOptions(selected=""){return `<option value="">선택</option>${POSITIONS.map(p=>`<option value="${p}" ${selected===p?"selected":""}>${p}</option>`).join("")}`}

    async function loadApprovedNicknames(){
      const q=query(collection(db,"users"),where("approved","==",true));
      const snap=await getDocs(q);
      approvedNicknames=[];
      snap.forEach(d=>{const u=d.data(); if(u.nickname) approvedNicknames.push(u.nickname);});
      approvedNicknames.sort((a,b)=>a.localeCompare(b));
    }

    function setupAutocomplete(input){
      const wrap=input.closest(".autocomplete-wrap");
      if(!wrap) return;
      const list=wrap.querySelector(".autocomplete-list");
      let activeIndex=-1,currentItems=[];
      function render(keyword=""){
        const lower=keyword.toLowerCase();
        currentItems=approvedNicknames.filter(n=>!lower || n.toLowerCase().startsWith(lower)).slice(0,6);
        activeIndex=currentItems.length?0:-1;
        if(!currentItems.length){list.innerHTML=`<div class="autocomplete-empty">일치하는 선수가 없습니다</div>`;list.classList.remove("hidden");return;}
        list.innerHTML=currentItems.map((n,i)=>`<div class="autocomplete-item ${i===activeIndex?"active":""}" data-name="${n}">${n}</div>`).join("");
        list.classList.remove("hidden");
      }
      function refresh(){list.querySelectorAll(".autocomplete-item").forEach((it,i)=>it.classList.toggle("active",i===activeIndex));}
      function selectName(name){input.value=name;list.classList.add("hidden");}
      input.addEventListener("focus",()=>render(input.value.trim()));
      input.addEventListener("input",()=>render(input.value.trim()));
      input.addEventListener("keydown",e=>{
        if(list.classList.contains("hidden")) return;
        if(e.key==="ArrowDown"){e.preventDefault();if(currentItems.length){activeIndex=(activeIndex+1)%currentItems.length;refresh();}}
        if(e.key==="ArrowUp"){e.preventDefault();if(currentItems.length){activeIndex=(activeIndex-1+currentItems.length)%currentItems.length;refresh();}}
        if(e.key==="Enter"){e.preventDefault();if(activeIndex>=0&&currentItems[activeIndex])selectName(currentItems[activeIndex]);}
        if(e.key==="Escape")list.classList.add("hidden");
      });
      list.addEventListener("mousedown",e=>{const item=e.target.closest(".autocomplete-item");if(item)selectName(item.dataset.name);});
      document.addEventListener("click",e=>{if(!wrap.contains(e.target))list.classList.add("hidden");});
    }

    function createRow(order,data={}){
      const tr=document.createElement("tr");
      tr.innerHTML=`
        <td><input class="order-input" value="${data.order||order||""}"></td>
        <td><div class="autocomplete-wrap"><input class="player-input player-autocomplete" value="${data.name||""}" placeholder="선수명 또는 선수명-용병"><div class="autocomplete-list hidden"></div></div></td>
        <td><select class="position-input">${positionOptions(data.position||"")}</select></td>`;
      tr.querySelectorAll(".player-autocomplete").forEach(setupAutocomplete);
      return tr;
    }

    function renderEditorRows(players=[]){
      lineupBody.innerHTML="";
      for(let i=1;i<=9;i++){
        const p=players[i-1]||{};
        lineupBody.appendChild(createRow(i,{order:p.order||i,name:p.name||"",position:p.position||""}));
      }
    }

    function getPlayersFromEditor(){
      return [...lineupBody.querySelectorAll("tr")].map(row=>({
        order:row.querySelector(".order-input").value.trim(),
        name:normalizeMercenaryName(row.querySelector(".player-input").value),
        position:row.querySelector(".position-input").value
      })).filter(p=>p.name||p.position);
    }

    function renderReadonlyLineup(data){
      if(!data?.players?.length) return `<p class="empty-text">저장된 라인업이 없습니다.</p>`;
      return `<div class="readonly-lineup">${data.players.map(p=>`<div class="readonly-row"><div class="readonly-order">${p.order||"-"}</div><div class="readonly-name">${p.name||"-"}</div><div class="readonly-pos">${p.position||"-"}</div></div>`).join("")}</div>`;
    }

    async function loadTodayLineup(){
      const date=today();
      const snap=await getDocs(query(collection(db,"lineups"),where("gameDate","==",date)));
      const arr=[];
      snap.forEach(d=>arr.push({id:d.id,...d.data()}));
      arr.sort((a,b)=>{
        const sideOrder = v => v==='홈팀' ? 0 : v==='원정팀' ? 1 : 2;
        return (a.gameTime||'').localeCompare(b.gameTime||'') || sideOrder(a.teamSide)-sideOrder(b.teamSide);
      });
      if(!arr.length){todayLineupBox.innerHTML=`<p class="empty-text">오늘 저장된 라인업이 없습니다.</p>`;return;}
      todayLineupBox.innerHTML=arr.map(data=>`<div class="lineup-box"><div class="lineup-top"><span class="badge">${data.gameType||"-"}</span>${data.gameDate||"-"} ${data.gameTime||""} vs ${data.opponent||"-"}</div><div class="lineup-note">팀 구분: <strong>${data.teamSide||"-"}</strong><br>주장/팀명: <strong>${data.captainName||"-"}</strong><br>선발투수: <strong>${data.pitcher||"-"}</strong></div>${renderReadonlyLineup(data)}</div>`).join("");
    }

    function renderSavedLineups(){
      if(!savedData.length){savedLineups.innerHTML=`<p class="empty-text">저장된 라인업이 없습니다.</p>`;return;}
      savedLineups.innerHTML="";
      savedData.forEach(data=>{
        const box=document.createElement("div"); box.className="lineup-box";
        box.innerHTML=`<div class="lineup-top"><span class="badge">${data.gameType||"-"}</span>${data.gameDate||"-"} ${data.gameTime||""} vs ${data.opponent||"-"}</div>
        <div class="lineup-note">팀 구분: <strong>${data.teamSide||"-"}</strong><br>주장/팀명: <strong>${data.captainName||"-"}</strong><br>선발투수: <strong>${data.pitcher||"-"}</strong></div>
        <div class="lineup-detail hidden">${renderReadonlyLineup(data)}</div>
        <div class="lineup-actions">
          <button class="lineup-btn small sub select-btn" type="button">상세 보기</button>
          <button class="lineup-btn small edit" type="button" data-edit="${data.id}">수정</button>
          <button class="lineup-btn small delete" type="button" data-delete="${data.id}">삭제</button>
        </div>`;
        const detail=box.querySelector(".lineup-detail");
        box.querySelector(".lineup-top").onclick=()=>detail.classList.toggle("hidden");
        box.querySelector(".select-btn").onclick=()=>detail.classList.toggle("hidden");
        box.querySelector("[data-edit]").onclick=()=>editLineup(data.id);
        box.querySelector("[data-delete]").onclick=()=>deleteLineup(data.id);
        savedLineups.appendChild(box);
      });
    }

    async function saveLineup(){
      const gameType=gameTypeInput.value, gameDate=gameDateInput.value, gameTime=gameTimeInput.value.trim();
      const opponent=opponentInput.value.trim(), teamSide=teamSideInput.value, captainName=captainNameInput.value.trim(), pitcher=normalizeMercenaryName(startingPitcherInput.value), players=getPlayersFromEditor();
      if(!gameDate||!gameTime||!opponent){alert("경기 날짜, 시간, 상대팀은 꼭 입력해줘.");return;}
      const id=lineupId(gameType,gameDate,gameTime,teamSide,captainName);
      const data={id,gameType,gameDate,gameTime,opponent,teamSide,captainName,pitcher,players,updatedAt:Date.now()};

      if(currentEditId && currentEditId !== id){
        await setDoc(doc(db,"lineups",id),data);
        await deleteDoc(doc(db,"lineups",currentEditId));
      } else {
        await setDoc(doc(db,"lineups",id),data);
      }

      alert(currentEditId ? "라인업 수정 완료!" : "라인업 저장 완료!");
      currentEditId=id;
      await loadTodayLineup();
    }

    async function editLineup(id){
      const snap=await getDoc(doc(db,"lineups",id));
      if(!snap.exists()){alert("라인업을 찾을 수 없습니다.");return;}
      const data=snap.data();
      currentEditId=id;
      gameTypeInput.value=data.gameType||"연습경기";
      gameDateInput.value=data.gameDate||today();
      gameTimeInput.value=data.gameTime||"";
      opponentInput.value=data.opponent||"";
      teamSideInput.value=data.teamSide||"홈팀";
      captainNameInput.value=data.captainName||"";
      startingPitcherInput.value=data.pitcher||"";
      renderEditorRows(data.players||[]);
      window.scrollTo({top:0,behavior:"smooth"});
    }

    async function deleteLineup(id){
      if(!confirm("이 라인업을 삭제할까?"))return;
      await deleteDoc(doc(db,"lineups",id));
      await loadTodayLineup();
    }

    function resetForm(){
      currentEditId=null;
      gameTypeInput.value="연습경기";
      gameDateInput.value=today();
      gameTimeInput.value="";
      opponentInput.value="";
      teamSideInput.value="홈팀";
      captainNameInput.value="";
      startingPitcherInput.value="";
      renderEditorRows();
    }

    checkLogin(async (user,userData)=>{
      const canEdit=isStaff(userData);
      await loadApprovedNicknames();
      await loadTodayLineup();
      if(canEdit){
        editorCard.classList.remove("hidden");
        savedCard.classList.remove("hidden");
        resetForm();
        setupAutocomplete(startingPitcherInput);
        onSnapshot(query(collection(db,"lineups"),orderBy("updatedAt","desc")),snapshot=>{
          savedData=[]; snapshot.forEach(d=>savedData.push({id:d.id,...d.data()}));
          renderSavedLineups();
        });
      } else {
        editorCard.classList.add("hidden");
        savedCard.classList.add("hidden");
      }
    });

    saveBtn.addEventListener("click",saveLineup);
    resetBtn.addEventListener("click",resetForm);
  </script>
</body>
</html>
