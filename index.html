<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>레이 마린스</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page">
    <div class="card-box">
      <h2>레이 마린스</h2>
      <p id="userInfo" class="page-note">로그인 정보를 불러오는 중...</p>

      <div class="home-links">
        <a href="lineup.html">
          <div class="title">라인업</div>
          <div class="sub">Lineup</div>
        </a>

        <a href="record.html">
          <div class="title">기록실</div>
          <div class="sub">Records</div>
        </a>

        <a href="scoresheet.html">
          <div class="title">기록지 작성</div>
          <div class="sub">Scoresheet</div>
        </a>

        <a href="mypage.html" id="mypageLink">
          <div class="title">마이페이지</div>
          <div class="sub">My Stats</div>
        </a>

        <a id="adminLink" class="hidden" href="admin-users.html">
          <div class="title">회원 승인 관리</div>
          <div class="sub">Admin Approval</div>
        </a>

        <a href="#" id="logoutBtn">
          <div class="title">로그아웃</div>
          <div class="sub">Logout</div>
        </a>
      </div>
    </div>
  </div>

  <script type="module">
    import { checkLogin, logout, isAdmin } from "./auth.js";

    const userInfo = document.getElementById("userInfo");
    const adminLink = document.getElementById("adminLink");
    const logoutBtn = document.getElementById("logoutBtn");

    logoutBtn.addEventListener("click", async (event) => {
      event.preventDefault();
      await logout();
    });

    checkLogin((user, userData) => {
      userInfo.textContent = `${userData.nickname} #${userData.number}`;
      if (isAdmin(userData)) {
        adminLink.classList.remove("hidden");
      }
    });
  </script>
</body>
</html>
